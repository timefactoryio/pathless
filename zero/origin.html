<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no" />
		<title>hello.universe</title>
		<style>
			:root {
				--b: 1px solid blue;
			}
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
				user-select: none;
				-webkit-user-select: none;
			}
			[hidden] {
				display: none !important;
			}
			body {
				height: 100dvh;
				overflow: hidden;
				font-family: sans-serif;
				background: #000;
				color: #fff;
				display: flex;
				flex-direction: column;
				border: var(--b);
				border-radius: 5px;
				touch-action: none;
			}
			#universe {
				flex: 1;
				min-height: 0;
				display: flex;
			}
			:is(#zero, #fx, #one) {
				flex: 1;
				overflow: hidden;
				container-type: size;
				position: relative;
				isolation: isolate;
				display: flex;
				flex-direction: column;
				touch-action: none;
				overscroll-behavior: none;
			}
			:is(#zero, #fx, #one) > * {
				width: 100%;
			}
			:is(#zero, #fx, #one) > :first-child {
				flex: 1;
				min-height: 0;
			}
			#zero {
				grid-area: zero;
				container-name: zero;
			}
			#fx {
				grid-area: fx;
				container-name: fx;
			}
			#one {
				grid-area: one;
				container-name: one;
			}
			#universe[data-layout='1'][data-variant='1'] {
				flex-direction: column;
			}
			#universe[data-layout='2'] {
				display: grid;
				grid-template-columns: 1fr 1fr;
				grid-template-rows: 1fr 1fr;
			}
			#universe[data-layout='2'][data-variant='0'] {
				grid-template-areas: 'zero fx' 'zero one';
			}
			#universe[data-layout='2'][data-variant='1'] {
				grid-template-areas: 'zero zero' 'one  fx';
			}
			#universe[data-layout='2'][data-variant='2'] {
				grid-template-areas: 'one  zero' 'fx   zero';
			}
			#universe[data-layout='2'][data-variant='3'] {
				grid-template-areas: 'fx   one' 'zero zero';
			}
			#universe:not([data-layout='0'])[data-variant='0'] #zero {
				border-right: var(--b);
			}
			#universe:not([data-layout='0'])[data-variant='1'] #zero {
				border-bottom: var(--b);
			}
			#universe[data-layout='2'][data-variant='2'] #zero {
				border-left: var(--b);
			}
			#universe[data-layout='2'][data-variant='3'] #zero {
				border-top: var(--b);
			}
			#universe[data-layout='2'][data-variant='0'] #fx {
				border-bottom: var(--b);
			}
			#universe[data-layout='2'][data-variant='1'] #fx {
				border-left: var(--b);
			}
			#universe[data-layout='2'][data-variant='2'] #fx {
				border-top: var(--b);
			}
			#universe[data-layout='2'][data-variant='3'] #fx {
				border-right: var(--b);
			}
			#panel {
				height: 15vh;
				border-top: var(--b);
				touch-action: none;
				overscroll-behavior: none;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 0.5em;
			}
		</style>
		<script>
			let lastTouch = 0;
			for (const t of ['touchstart', 'touchend'])
				document.addEventListener(
					t,
					(e) => {
						const now = Date.now();
						if (now - lastTouch < 300) e.preventDefault();
						lastTouch = now;
					},
					{ passive: false },
				);
			window.circuit = '{{.CIRCUIT}}'.replace(
				'localhost',
				location.hostname,
			);
			class Pathless {
				#td = new TextDecoder();
				#range = document.createRange();
				constructor() {
					this.cache = new Map();
					this.init();
				}

				// decode reads the wire format into [{ type, data }]:
				//   [2B count]  per entry: [1B typeLen][type] [4B dataLen][data]
				decode(buf) {
					const bytes = new Uint8Array(buf);
					let pos = 0;
					const count = (bytes[pos++] << 8) | bytes[pos++];
					return Array.from({ length: count }, () => {
						const tl = bytes[pos++];
						const type = this.#td.decode(
							bytes.subarray(pos, (pos += tl)),
						);
						const n =
							((bytes[pos] << 24) |
								(bytes[pos + 1] << 16) |
								(bytes[pos + 2] << 8) |
								bytes[pos + 3]) >>>
							0;
						pos += 4;
						return { type, data: bytes.subarray(pos, (pos += n)) };
					});
				}

				// source fetches and decodes a route (empty path = the root).
				// decode already gives each entry its type/data; source just adds
				// a lazily-created blob url on top. Cached per path.
				source(path = '') {
					if (!this.cache.has(path)) {
						const url = path
							? `${window.circuit}/${path}`
							: window.circuit;
						this.cache.set(
							path,
							fetch(url)
								.then((r) => r.arrayBuffer())
								.then((buf) =>
									this.decode(buf).map((e) => {
										let u;
										return Object.defineProperty(e, 'url', {
											get: () =>
												(u ??= URL.createObjectURL(
													new Blob([e.data], {
														type: e.type,
													}),
												)),
										});
									}),
								),
						);
					}
					return this.cache.get(path);
				}
				exec(el, data) {
					el.replaceChildren(
						this.#range.createContextualFragment(
							this.#td.decode(data),
						),
					);
				}

				async init() {
					const [universe, ...frames] = await this.source();
					// item 0 builds the universe and its coordinates/input/
					// keyboard, attaching each onto pathless (p.universe,
					// p.input, p.keyboard, p.coordinates).
					this.exec(
						document.getElementById('universe'),
						universe.data,
					);
					this.universe.init(frames.map((f) => f.data));
				}
			}

			document.addEventListener('DOMContentLoaded', () => {
				window.pathless = new Pathless();
			});
		</script>
	</head>
	<body>
		<div id="universe" data-layout="0" data-variant="0"></div>
		<div id="panel" hidden></div>
	</body>
</html>
