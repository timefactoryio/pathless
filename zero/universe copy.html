<div id="axis-x" hidden></div>
<div id="axis-y" hidden></div>
<div id="zero"></div>
<div id="fx" hidden></div>
<div id="one" hidden></div>
<div id="panel" hidden></div>

<script>
	class Universe {
		static layout = [
			{ visible: null, variants: 1, axis: null },
			{
				visible: [0, 1],
				variants: 2,
				axis: [
					[1, null],
					[null, -1],
				],
			},
			{
				visible: [0, 1, 2],
				variants: 4,
				axis: [
					[1, -1],
					[-1, -1],
					[-1, 1],
					[1, 1],
				],
			},
			{ focused: 0, prev: [0, 0], l: 0, v: 0 },
		];
		constructor() {
			this.el = document.getElementById('universe');
			this.axisX = document.getElementById('axis-x');
			this.axisY = document.getElementById('axis-y');
			this.space = ['zero', 'fx', 'one'].map((id) => ({
				el: document.getElementById(id),
				frame: null,
			}));
			this.panel = document.getElementById('panel');
			this.frames = [];
			this.input = null;
			this.L = this.T = this.W = this.H = 0;
			this.#measure();
			this.init();
		}

		#measure() {
			const update = () => {
				const r = this.el.getBoundingClientRect();
				this.L = r.left;
				this.T = r.top;
				this.W = r.width || 1;
				this.H = r.height || 1;
			};
			update();
			addEventListener('resize', update, { passive: true });
			addEventListener('orientationchange', update, { passive: true });
		}

		#axis(l, v) {
			const [x, y] = Universe.layout[l].axis?.[v] ?? [null, null];
			this.axisY.hidden = x === null;
			this.axisX.hidden = y === null;
			if (x !== null) {
				this.axisY.style.borderLeft = x < 0 ? 'var(--b)' : '';
				this.axisY.style.borderRight = x > 0 ? 'var(--b)' : '';
			}
			if (y !== null) {
				this.axisX.style.borderTop = y > 0 ? 'var(--b)' : '';
				this.axisX.style.borderBottom = y < 0 ? 'var(--b)' : '';
			}
		}

		at(x, y) {
			return [
				(2 * (x - this.L)) / this.W - 1,
				1 - (2 * (y - this.T)) / this.H,
				Date.now(),
			];
		}

		get state() {
			return Universe.layout[3];
		}

		read(i = this.state.focused) {
			return this.space[i].frame.state.get(this.space[i].el.id);
		}
		write(k, v, i = this.state.focused) {
			this.space[i].frame.state.get(this.space[i].el.id).set(k, v);
		}
		sync(...indices) {
			const { focused, l } = this.state;
			const visible = Universe.layout[l].visible ?? [focused];
			(indices.length ? indices : visible).forEach((i) => {
				this.state.focused = i;
				this.exec(this.space[i].el, this.space[i].frame.el);
			});
			this.state.focused = focused;
		}
		layout(l, v = 0) {
			if (l > 0) {
				this.state.prev[0] = l;
				this.state.prev[1] = v;
			}
			this.state.l = l;
			this.state.v = v;
			this.#axis(l, v);
			const visible = Universe.layout[l].visible ?? [this.state.focused];
			this.space.forEach((s, i) => {
				s.el.hidden = !visible.includes(i);
			});
			this.sync();
		}
		cycle(l) {
			const { l: cur } = this.state;
			if (cur === 0) return this.layout(...this.state.prev);
			l ??= cur;
			this.layout(
				l,
				cur === l
					? (this.state.v + 1) % Universe.layout[l].variants
					: 0,
			);
		}
		nav(dir, i = this.state.focused) {
			const s = this.space[i];
			s.frame =
				this.frames[
					(this.frames.indexOf(s.frame) + dir + this.frames.length) %
						this.frames.length
				];
			this.sync(i);
		}
		focus() {
			const { focused, l } = this.state;
			const visible = Universe.layout[l].visible ?? [focused];
			this.state.focused =
				visible[(visible.indexOf(focused) + 1) % visible.length];
		}
		toggle() {
			this.panel.hidden = !this.panel.hidden;
		}
	}
</script>
