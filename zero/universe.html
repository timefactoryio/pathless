<div id="zero"></div>
<div id="one" hidden></div>
<div id="two" hidden></div>

<script>
	{
		class Universe {
			static ids = ['zero', 'one', 'two'];
			static layouts = [null, [0, 1], [0, 1, 2]];
			static variants = [1, 2, 4];
			constructor(pathless, frames, panels) {
				this.pathless = pathless;
				this.el = document.getElementById('universe');
				this.panel = document.getElementById('panel');
				this.spaces = Universe.ids.map((id) => ({
					el: document.getElementById(id),
					frame: 0,
					state: new Map(),
				}));
				this.frames = frames;
				this.panels = panels;
				this.state = { focused: 0, prev: null, l: 0, v: 0 };
				this.tap = 0.1;
				this.swipe = 0.25;
			}

			get space() {
				return this.spaces[this.state.focused];
			}
			get frame() {
				return this.space.el.querySelector('div');
			}
			visible(l = this.state.l) {
				return l === 0 ? [this.state.focused] : Universe.layouts[l];
			}
			init() {
				this.spaces.forEach((s) => (s.frame = 0));
				this.layout(0);
			}
			togglePanel() {
				this.panel.hidden = !this.panel.hidden;
				if (!this.panel.hidden) this.showPanel(this.space.frame);
			}
			showPanel(i) {
				this.pathless.exec(
					this.panel,
					this.panels[i % this.panels.length],
				);
			}
			read(i = this.state.focused) {
				const s = this.spaces[i];
				let m = s.state.get(s.frame);
				if (!m) s.state.set(s.frame, (m = new Map()));
				return m;
			}
			write(key, val, i = this.state.focused) {
				this.read(i).set(key, val);
			}
			pin(i = this.state.focused) {
				return {
					i,
					read: () => this.read(i),
					write: (key, val) => this.write(key, val, i),
				};
			}
			sync(...indices) {
				const { focused } = this.state;
				(indices.length ? indices : this.visible()).forEach((i) => {
					this.state.focused = i;
					this.pathless.exec(
						this.spaces[i].el,
						this.frames[this.spaces[i].frame],
					);
				});
				this.state.focused = focused;
				this.pathless.keyboard?.update();
			}

			layout(l, v = 0) {
				if (l > 0) this.state.prev = [l, v];
				this.state.l = l;
				this.state.v = v;
				this.el.dataset.layout = l;
				this.el.dataset.variant = v;
				const vis = this.visible(l);
				this.spaces.forEach((s, i) => (s.el.hidden = !vis.includes(i)));
				this.sync();
			}

			cycle(l) {
				const { l: cur, v, prev } = this.state;
				if (cur === 0 && prev) return this.layout(...prev);
				l ??= cur;
				this.layout(l, cur === l ? (v + 1) % Universe.variants[l] : 0);
			}

			nav(dir, i = this.state.focused) {
				const s = this.spaces[i];
				s.frame =
					(s.frame + dir + this.frames.length) % this.frames.length;
				this.sync(i);
			}

			focus() {
				const v = this.visible();
				this.state.focused =
					v[(v.indexOf(this.state.focused) + 1) % v.length];
				this.pathless.keyboard?.update();
			}

			at(clientX, clientY, r) {
				return [
					(2 * (clientX - r.left)) / (r.width || 1) - 1,
					1 - (2 * (clientY - r.top)) / (r.height || 1),
				];
			}

			press(clientX, clientY) {
				for (const i of this.visible()) {
					const r = this.spaces[i].el.getBoundingClientRect();
					if (
						clientX < r.left ||
						clientX > r.right ||
						clientY < r.top ||
						clientY > r.bottom
					)
						continue;
					this.state.focused = i;
					const start = this.at(clientX, clientY, r);
					return {
						i,
						close: (x, y) => {
							const end = this.at(x, y, r);
							return { end, name: this.classify(start, end) };
						},
					};
				}
				return null;
			}

			classify(a, b) {
				const dx = b[0] - a[0],
					dy = b[1] - a[1];
				const distance = Math.abs(dx) + Math.abs(dy);
				if (distance < this.tap)
					return 'tap' + (b[0] >= 0 ? 'Right' : 'Left');
				if (Math.abs(dx) < Math.abs(dy) || distance < this.swipe)
					return null;
				return 'swipe' + (dx >= 0 ? 'Right' : 'Left');
			}
		}

		class Input {
			#active = new Map();
			#bindings = new Map();

			static shellNames = {
				1: { fn: (u) => u.cycle(0) },
				2: { fn: (u) => u.cycle(1) },
				3: { fn: (u) => u.cycle(2) },
				tab: { fn: (u) => u.focus() },
				q: { fn: (u) => u.nav(-1), desc: 'back', touch: 'swipeRight' },
				e: { fn: (u) => u.nav(1), desc: 'next', touch: 'swipeLeft' },
				z: { fn: (u) => u.togglePanel() },
			};

			static gestureNames = Object.fromEntries(
				Object.entries(this.shellNames)
					.filter(([, v]) => v.touch)
					.map(([, v]) => [v.touch, v]),
			);

			static #tapEvents = ['pointerdown', 'pointerup', 'pointercancel'];
			static #keyEvents = ['keydown', 'keyup'];

			constructor(pathless) {
				this.pathless = pathless;
				this.universe = pathless.universe;
				const o = { passive: true };
				for (const t of Input.#tapEvents)
					this.universe.el.addEventListener(t, this, o);
				for (const t of Input.#keyEvents)
					window.addEventListener(t, this);

				let lastTouch = 0;
				const blockDoubleTap = (e) => {
					if (Date.now() - lastTouch < 300) e.preventDefault();
					lastTouch = Date.now();
				};
				for (const t of ['touchstart', 'touchend'])
					document.addEventListener(t, blockDoubleTap, {
						passive: false,
					});
			}

			handleEvent(e) {
				const result = this[e.type]?.(e);
				if (result) this.dispatch(result);
			}

			pointerdown({ pointerId, clientX, clientY }) {
				const t = this.universe.press(clientX, clientY);
				if (t) this.#active.set(pointerId, t);
			}

			pointerup({ pointerId, clientX, clientY }) {
				const a = this.#active.get(pointerId);
				if (!a) return;
				this.#active.delete(pointerId);
				return { i: a.i, ...a.close(clientX, clientY) };
			}
			pointercancel({ pointerId }) {
				this.#active.delete(pointerId);
			}

			key(e, phase) {
				return {
					i: this.universe.state.focused,
					name: e.key.toLowerCase(),
					phase,
					event: e,
				};
			}
			keydown(e) {
				return this.key(e, 'down');
			}
			keyup(e) {
				return this.key(e, 'up');
			}

			dispatch({ name, phase, i, event, ...g }) {
				if (!name) return;
				if (name.startsWith('swipe')) navigator.vibrate?.(5);

				const shell =
					Input.shellNames[name] ?? Input.gestureNames[name];
				if (shell) {
					event?.preventDefault();
					if (event)
						this.pathless.keyboard?.flash(name, phase !== 'up');
					if (phase !== 'up') shell.fn(this.universe);
					return;
				}

				const bind = this.#bindings.get(i)?.[name];
				if (typeof bind === 'function') phase !== 'up' && bind(g);
				else bind?.[phase]?.(g);
			}

			bind(binds) {
				this.#bindings.set(this.universe.state.focused, binds);
				return this;
			}
		}
		pathless.universe = new Universe(
			pathless,
			pathless.frames,
			pathless.panels,
		);
		pathless.input = new Input(pathless);
	}
</script>
