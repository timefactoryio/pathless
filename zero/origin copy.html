<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no" />
		<title>hello.universe</title>
		<style>
			:root {
				--b: 1px solid blue;
			}
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
				user-select: none;
				-webkit-user-select: none;
			}
			[hidden] {
				display: none !important;
			}
			body {
				height: 100dvh;
				overflow: hidden;
				font-family: sans-serif;
				background: #000;
				color: #fff;
				display: flex;
				flex-direction: column;
				border: var(--b);
				border-radius: 5px;
				touch-action: none;
			}
			#universe {
				flex: 1;
				min-height: 0;
				display: flex;
			}
			:is(#zero, #fx, #one) {
				flex: 1;
				overflow: hidden;
				container-type: size;
				position: relative;
				isolation: isolate;
				display: flex;
				flex-direction: column;
				touch-action: none;
				overscroll-behavior: none;
			}
			:is(#zero, #fx, #one) > * {
				width: 100%;
			}
			:is(#zero, #fx, #one) > :first-child {
				flex: 1;
				min-height: 0;
			}
			#zero {
				grid-area: zero;
				container-name: zero;
			}
			#fx {
				grid-area: fx;
				container-name: fx;
			}
			#one {
				grid-area: one;
				container-name: one;
			}
			#universe[data-layout='1'][data-variant='1'] {
				flex-direction: column;
			}
			#universe[data-layout='2'] {
				display: grid;
				grid-template-columns: 1fr 1fr;
				grid-template-rows: 1fr 1fr;
			}
			#universe[data-layout='2'][data-variant='0'] {
				grid-template-areas: 'zero fx' 'zero one';
			}
			#universe[data-layout='2'][data-variant='1'] {
				grid-template-areas: 'zero zero' 'one  fx';
			}
			#universe[data-layout='2'][data-variant='2'] {
				grid-template-areas: 'one  zero' 'fx   zero';
			}
			#universe[data-layout='2'][data-variant='3'] {
				grid-template-areas: 'fx   one' 'zero zero';
			}
			#universe:not([data-layout='0'])[data-variant='0'] #zero {
				border-right: var(--b);
			}
			#universe:not([data-layout='0'])[data-variant='1'] #zero {
				border-bottom: var(--b);
			}
			#universe[data-layout='2'][data-variant='2'] #zero {
				border-left: var(--b);
			}
			#universe[data-layout='2'][data-variant='3'] #zero {
				border-top: var(--b);
			}
			#universe[data-layout='2'][data-variant='0'] #fx {
				border-bottom: var(--b);
			}
			#universe[data-layout='2'][data-variant='1'] #fx {
				border-left: var(--b);
			}
			#universe[data-layout='2'][data-variant='2'] #fx {
				border-top: var(--b);
			}
			#universe[data-layout='2'][data-variant='3'] #fx {
				border-right: var(--b);
			}
			#panel {
				height: 15vh;
				border-top: var(--b);
				touch-action: none;
				overscroll-behavior: none;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 0.5em;
			}
		</style>
		<script>
			window.circuit = '{{.CIRCUIT}}'.replace(
				'localhost',
				location.hostname,
			);
			class Pathless {
				#td = new TextDecoder();
				#range = document.createRange();
				constructor() {
					((this.cache = new Map()), (this.universe = null));
					this.init();
				}
				wire(path = '') {
					if (!this.cache.has(path)) {
						const url = path
							? `${window.circuit}/${path}`
							: window.circuit;
						this.cache.set(
							path,
							fetch(url)
								.then((r) => r.blob())
								.then(URL.createObjectURL),
						);
					}
					return this.cache.get(path);
				}

				async init() {
					const u = this.universe;
					const [universe, ...frames] = this.wire(
						await (await fetch(window.circuit)).arrayBuffer(),
						(name, type, data) => data,
					);
					this.exec(this.universe, universe);
				}

				exec(el, data) {
					el.replaceChildren(
						this.#range.createContextualFragment(
							this.#td.decode(data),
						),
					);
				}
			}

			document.addEventListener('DOMContentLoaded', () => {
				window.pathless = new Pathless();
			});
		</script>
	</head>
	<body>
		<div id="universe" data-layout="0" data-variant="0"></div>
	</body>
</html>
