<script>
	{
		class Coordinates {
			static point(x = null, y = null, z = null) {
				return [x, y, z];
			}

			static #quads = [
				null,
				[
					[
						[2, 3],
						[1, 4],
					],
					[
						[1, 2],
						[3, 4],
					],
				],
				[
					[[2, 3], [1], [4]],
					[[1, 2], [4], [3]],
					[[1, 4], [3], [2]],
					[[3, 4], [2], [1]],
				],
			];

			constructor() {
				this.threshold = 0.05;
				this.tap = 0.1;
				this.swipe = 0.25;
			}

			measure(el) {
				if (this._onResize) {
					removeEventListener('resize', this._onResize);
					removeEventListener('orientationchange', this._onResize);
				}
				const update = () => {
					const r = el.getBoundingClientRect();
					this.L = r.left;
					this.T = r.top;
					this.W = r.width || 1;
					this.H = r.height || 1;
				};
				update();
				this._onResize = update;
				addEventListener('resize', update, { passive: true });
				addEventListener('orientationchange', update, {
					passive: true,
				});
			}

			at(clientX, clientY) {
				const u = (clientX - this.L) / this.W,
					v = (clientY - this.T) / this.H;
				return [2 * u - 1, 1 - 2 * v, Date.now()];
			}

			quadrant([x, y]) {
				return x >= 0 ? (y >= 0 ? 1 : 4) : y >= 0 ? 2 : 3;
			}

			#bounds(quads) {
				let m = 0;
				for (const q of quads) m |= 1 << q;
				return [
					m & 12 ? -1 : 0,
					m & 18 ? 1 : 0,
					m & 24 ? -1 : 0,
					m & 6 ? 1 : 0,
				];
			}

			#sub([x, y, t], [x0, x1, y0, y1]) {
				return [
					(2 * (x - x0)) / (x1 - x0) - 1,
					(2 * (y - y0)) / (y1 - y0) - 1,
					t,
				];
			}

			quads(l, v, i) {
				return Coordinates.#quads[l]?.[v]?.[i] ?? [1, 2, 3, 4];
			}

			contains(pt, quads) {
				return quads.includes(this.quadrant(pt));
			}

			track(clientX, clientY, quads) {
				const bounds = quads ? this.#bounds(quads) : null;
				const toLocal = bounds
					? (pt) => this.#sub(pt, bounds)
					: (pt) => pt;
				const pair = {
					start: toLocal(this.at(clientX, clientY)),
					end: [],
					path: [],
					_dir: null,
				};
				pair.move = (x, y) => {
					const point = toLocal(this.at(x, y));
					const dir = this.direction(
						pair.path.at(-1)?.point ?? pair.start,
						point,
					);
					if (dir && dir !== pair._dir) {
						pair.path.push({ point, direction: dir });
						pair._dir = dir;
					}
				};
				pair.close = (endX, endY) => {
					pair.end = toLocal(this.at(endX, endY));
					const direction = this.direction(pair.start, pair.end);
					return {
						end: pair.end,
						distance: this.distance(pair.start, pair.end),
						axis: this.axis(pair.start, pair.end),
						direction,
						type: this.type(direction, pair.path),
						quadrant: this.quadrant(pair.start),
					};
				};
				return pair;
			}

			distance(a, b) {
				return Math.abs(b[0] - a[0]) + Math.abs(b[1] - a[1]);
			}
			axis(a, b) {
				return Math.abs(b[0] - a[0]) >= Math.abs(b[1] - a[1])
					? 'x'
					: 'y';
			}
			direction(a, b) {
				const dx = b[0] - a[0],
					dy = b[1] - a[1];
				if (Math.abs(dx) + Math.abs(dy) < this.threshold) return null;
				return Math.abs(dx) >= Math.abs(dy)
					? dx >= 0
						? 'right'
						: 'left'
					: dy >= 0
						? 'up'
						: 'down';
			}
			velocity(a, b) {
				const dt = b[2] - a[2];
				return dt > 0 ? this.distance(a, b) / dt : 0;
			}
			terminal(path, start, end) {
				return this.velocity(path.at(-1)?.point ?? start, end);
			}
			type(direction, path) {
				return direction === null
					? 'tap'
					: path.length > 1
						? 'gesture'
						: 'swipe';
			}
		}

		pathless.Coordinates = Coordinates;
	}
</script>
