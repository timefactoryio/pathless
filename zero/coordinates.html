<script>
	{
		class Coordinates {
			constructor(pathless) {
				this.universe = pathless.universe;
				this.threshold = 0.05;
				this.tap = 0.1;
				this.swipe = 0.25;
			}

			// locate: the visible space whose rect contains the client point.
			locate(clientX, clientY) {
				for (const i of this.universe.visible()) {
					const s = this.universe.spaces[i];
					const r = s.el.getBoundingClientRect();
					if (
						clientX >= r.left &&
						clientX <= r.right &&
						clientY >= r.top &&
						clientY <= r.bottom
					)
						return s;
				}
				return null;
			}

			// at: client pixel -> [-1, 1] within a rect.
			at(clientX, clientY, r) {
				return [
					(2 * (clientX - r.left)) / (r.width || 1) - 1,
					1 - (2 * (clientY - r.top)) / (r.height || 1),
				];
			}

			// track: a gesture within the focused space; close reports
			// the point in that space's local [-1, 1] plus its full
			// classification, including the declarative name (tap/swipe).
			track(clientX, clientY) {
				const r = this.universe.space.el.getBoundingClientRect();
				const pair = { start: this.at(clientX, clientY, r) };
				pair.close = (x, y) => {
					const end = this.at(x, y, r);
					const g = { end, ...this.classify(pair.start, end) };
					g.name =
						g.distance < this.tap
							? 'tap'
							: g.axis === 'x' && g.distance >= this.swipe
								? 'swipe' +
									g.direction[0].toUpperCase() +
									g.direction.slice(1)
								: null;
					return g;
				};
				return pair;
			}

			// classify: distance, dominant axis, and labeled direction of
			// a->b. direction is null when movement is below threshold
			// (i.e. the gesture is a tap, not a drag).
			classify(a, b) {
				const dx = b[0] - a[0],
					dy = b[1] - a[1];
				const distance = Math.abs(dx) + Math.abs(dy);
				const axis = Math.abs(dx) >= Math.abs(dy) ? 'x' : 'y';
				const direction =
					distance < this.threshold
						? null
						: axis === 'x'
							? dx >= 0
								? 'right'
								: 'left'
							: dy >= 0
								? 'up'
								: 'down';
				return { distance, axis, direction };
			}
		}

		pathless.coordinates = new Coordinates(pathless);
	}
</script>
