<script>
	{
		// Coordinates understands pointer events per space. It does not manage
		// the DOM or layout — CSS positions the spaces. It reads a space's live
		// rect to decide which visible space a pointer is in and to map a point
		// into that space's local [-1, 1] frame (+1 top), then tracks a gesture.
		class Coordinates {
			constructor(pathless) {
				this.pathless = pathless;
				this.universe = pathless.universe;
				this.threshold = 0.05;
				this.tap = 0.1;
				this.swipe = 0.25;
			}

			// locate: the visible space whose rect contains the client point.
			locate(clientX, clientY) {
				for (const i of this.universe.visible()) {
					const s = this.universe.spaces[i];
					const r = s.el.getBoundingClientRect();
					if (
						clientX >= r.left &&
						clientX <= r.right &&
						clientY >= r.top &&
						clientY <= r.bottom
					)
						return s;
				}
				return null;
			}

			// at: client pixel -> [-1, 1] within a space element's rect.
			at(clientX, clientY, el) {
				const r = el.getBoundingClientRect();
				return [
					(2 * (clientX - r.left)) / (r.width || 1) - 1,
					1 - (2 * (clientY - r.top)) / (r.height || 1),
					Date.now(),
				];
			}

			// track: a gesture within a space element; move/close report the
			// point in that space's local [-1, 1].
			track(clientX, clientY, el) {
				const pair = {
					start: this.at(clientX, clientY, el),
					path: [],
					_dir: null,
				};
				pair.move = (x, y) => {
					const point = this.at(x, y, el);
					const dir = this.direction(
						pair.path.at(-1) ?? pair.start,
						point,
					);
					if (dir && dir !== pair._dir) {
						pair.path.push(point);
						pair._dir = dir;
					}
				};
				pair.close = (x, y) => {
					const end = this.at(x, y, el);
					const direction = this.direction(pair.start, end);
					return {
						end,
						distance: this.distance(pair.start, end),
						axis: this.axis(pair.start, end),
						direction,
						type:
							direction === null
								? 'tap'
								: pair.path.length > 1
									? 'gesture'
									: 'swipe',
					};
				};
				return pair;
			}

			distance(a, b) {
				return Math.abs(b[0] - a[0]) + Math.abs(b[1] - a[1]);
			}
			axis(a, b) {
				return Math.abs(b[0] - a[0]) >= Math.abs(b[1] - a[1])
					? 'x'
					: 'y';
			}
			direction(a, b) {
				const dx = b[0] - a[0],
					dy = b[1] - a[1];
				if (Math.abs(dx) + Math.abs(dy) < this.threshold) return null;
				return Math.abs(dx) >= Math.abs(dy)
					? dx >= 0
						? 'right'
						: 'left'
					: dy >= 0
						? 'up'
						: 'down';
			}
			velocity(a, b) {
				const dt = b[2] - a[2];
				return dt > 0 ? this.distance(a, b) / dt : 0;
			}
		}

		pathless.coordinates = new Coordinates(pathless);
	}
</script>
