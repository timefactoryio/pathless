<script>
	{
		class Input {
			#active = new Map();
			#taps = new Map();

			constructor(universe) {
				this.universe = universe;
				this.space = universe.space;
				const o = { passive: true };
				for (const t of [
					'pointerdown',
					'pointermove',
					'pointerup',
					'pointercancel',
				])
					universe.el.addEventListener(t, this, o);
			}

			handleEvent(e) {
				this[e.type](e);
			}

			pointerdown({ pointerId, clientX, clientY }) {
				const co = this.universe.co;
				const pt = co.at(clientX, clientY);
				const visible = this.universe.visible;
				const i = this.space.findIndex(
					(s, idx) =>
						visible.includes(idx) && co.contains(pt, s.quads),
				);
				if (i === -1) return;
				this.universe.focused = i;
				this.#active.set(pointerId, {
					i,
					pair: co.track(clientX, clientY, this.space[i].quads),
				});
			}

			pointermove({ pointerId, clientX, clientY }) {
				this.#active.get(pointerId)?.pair.move(clientX, clientY);
			}

			pointerup({ pointerId, clientX, clientY }) {
				const a = this.#active.get(pointerId);
				if (!a) return;
				this.#active.delete(pointerId);
				const co = this.universe.co;
				const g = a.pair.close(clientX, clientY);
				if (g.distance < co.tap) {
					this.#taps.get(a.i)?.(g);
					return;
				}
				if (g.axis === 'x' && g.distance >= co.swipe) {
					navigator.vibrate?.(5);
					pathless.nav(g.direction === 'left' ? -1 : 1, a.i);
				}
			}

			pointercancel({ pointerId }) {
				this.#active.delete(pointerId);
			}

			tap(fn) {
				this.#taps.set(pathless.focused, fn);
			}
		}

		pathless.input = new Input(pathless.universe);
	}
</script>
