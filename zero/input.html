<script>
	{
		// Input owns the pointer stream. It locates each gesture to the space
		// that owns its starting point (via the universe), then routes taps and
		// horizontal swipes to that space.
		class Input {
			#active = new Map();
			#taps = new Map();

			constructor(pathless) {
				this.pathless = pathless;
				this.universe = pathless.universe;
				const o = { passive: true };
				for (const t of [
					'pointerdown',
					'pointermove',
					'pointerup',
					'pointercancel',
				])
					this.universe.el.addEventListener(t, this, o);
			}

			handleEvent(e) {
				this[e.type](e);
			}

			pointerdown({ pointerId, clientX, clientY }) {
				const co = this.pathless.coordinates;
				const s = co.locate(clientX, clientY);
				if (!s) return;
				this.universe.state.focused = this.universe.spaces.indexOf(s);
				this.#active.set(pointerId, {
					i: this.universe.state.focused,
					pair: co.track(clientX, clientY, s.el),
				});
			}

			pointermove({ pointerId, clientX, clientY }) {
				this.#active.get(pointerId)?.pair.move(clientX, clientY);
			}

			pointerup({ pointerId, clientX, clientY }) {
				const a = this.#active.get(pointerId);
				if (!a) return;
				this.#active.delete(pointerId);
				const co = this.pathless.coordinates;
				const g = a.pair.close(clientX, clientY);
				if (g.distance < co.tap) {
					this.#taps.get(a.i)?.(g);
					return;
				}
				if (g.axis === 'x' && g.distance >= co.swipe) {
					navigator.vibrate?.(5);
					this.universe.nav(g.direction === 'left' ? -1 : 1, a.i);
				}
			}

			pointercancel({ pointerId }) {
				this.#active.delete(pointerId);
			}

			// tap registers a handler for the focused space.
			tap(fn) {
				this.#taps.set(this.universe.state.focused, fn);
			}
		}

		pathless.input = new Input(pathless);
	}
</script>
