<script>
	{
		// Input resolves every pointer and keyboard event into one named
		// trigger ('a', 'tab', 'swipeLeft', 'tapTop', ...) and hands it to
		// dispatch. Shell-reserved names always win; anything else routes to
		// whatever the focused frame registered via bind().
		class Input {
			#active = new Map();
			#bindings = new Map();

			static shellNames = {
				1: { fn: (u) => u.cycle(0) },
				2: { fn: (u) => u.cycle(1) },
				3: { fn: (u) => u.cycle(2) },
				tab: { fn: (u) => u.focus() },
				q: { fn: (u) => u.nav(-1), desc: 'back', touch: 'swipeLeft' },
				e: { fn: (u) => u.nav(1), desc: 'next', touch: 'swipeRight' },
				z: { fn: (u) => u.toggle() },
			};

			// gestures that alias a shell key, keyed by gesture name.
			static gestureNames = Object.fromEntries(
				Object.entries(this.shellNames)
					.filter(([, v]) => v.touch)
					.map(([, v]) => [v.touch, v]),
			);

			constructor(pathless) {
				this.pathless = pathless;
				this.universe = pathless.universe;
				const o = { passive: true };
				for (const t of [
					'pointerdown',
					'pointermove',
					'pointerup',
					'pointercancel',
				])
					this.universe.el.addEventListener(t, this, o);
				window.addEventListener('keydown', this);
				window.addEventListener('keyup', this);
			}

			handleEvent(e) {
				const result = this[e.type]?.(e);
				if (result) this.dispatch(result);
			}

			pointerdown({ pointerId, clientX, clientY }) {
				const co = this.pathless.coordinates;
				const s = co.locate(clientX, clientY);
				if (!s) return;
				this.universe.state.focused = this.universe.spaces.indexOf(s);
				this.#active.set(pointerId, {
					i: this.universe.state.focused,
					pair: co.track(clientX, clientY, s.el),
				});
			}

			pointermove({ pointerId, clientX, clientY }) {
				this.#active.get(pointerId)?.pair.move(clientX, clientY);
			}

			pointerup({ pointerId, clientX, clientY }) {
				const a = this.#active.get(pointerId);
				if (!a) return;
				this.#active.delete(pointerId);
				const co = this.pathless.coordinates;
				const g = a.pair.close(clientX, clientY);
				const name =
					g.distance < co.tap
						? 'tap' + co.quadrant(g.end)
						: g.axis === 'x' && g.distance >= co.swipe
							? 'swipe' +
								g.direction[0].toUpperCase() +
								g.direction.slice(1)
							: null;
				if (!name) return;
				return { i: a.i, name, ...g };
			}

			pointercancel({ pointerId }) {
				this.#active.delete(pointerId);
			}

			keydown(e) {
				return {
					i: this.universe.state.focused,
					name: e.key.toLowerCase(),
					phase: 'down',
					event: e,
				};
			}
			keyup(e) {
				return {
					i: this.universe.state.focused,
					name: e.key.toLowerCase(),
					phase: 'up',
					event: e,
				};
			}

			dispatch({ name, phase, i, event, ...g }) {
				if (name.startsWith('swipe')) navigator.vibrate?.(5);

				const shell =
					Input.shellNames[name] ?? Input.gestureNames[name];
				if (shell) {
					event?.preventDefault();
					// event only exists for keydown/keyup — gestures never
					// touch the keyboard visualization.
					if (event)
						this.pathless.keyboard?.flash(name, phase !== 'up');
					if (phase !== 'up') shell.fn(this.universe);
					return;
				}

				const bind = this.#bindings.get(i)?.[name];
				if (typeof bind === 'function') phase !== 'up' && bind(g);
				else bind?.[phase]?.(g);
			}

			// bind registers gesture/key handlers for the focused space.
			// Gestures ('tapLeft', 'swipeUp', ...) are plain functions, fired
			// once. Keys are { down, up }, both optional.
			bind(binds) {
				this.#bindings.set(this.universe.state.focused, binds);
				return this;
			}
		}

		pathless.input = new Input(pathless);
	}
</script>
