<style>
	.gesture-surface {
		touch-action: none;
		overscroll-behavior: none;
		user-select: none;
		-webkit-user-select: none;
		-webkit-touch-callout: none;
		-webkit-tap-highlight-color: transparent;
	}
</style>
<script>
	{
		class Coordinates {
			static zero(x = null, y = null) {
				return { x, y };
			}
			constructor() {
				this.limit = 0.9;
				this.unit = 0.1;
			}

			measure(el) {
				const r = el.getBoundingClientRect();
				this.L = r.left;
				this.T = r.top;
				this.W = r.width || 1;
				this.H = r.height || 1;
				this.origin = [this.L + this.W / 2, this.T + this.H / 2];
			}

			at(clientX, clientY) {
				const u = (clientX - this.L) / this.W,
					v = (clientY - this.T) / this.H;
				return Coordinates.zero(2 * u - 1, 1 - 2 * v);
			}
			zone(p) {
				const ax = Math.abs(p.x),
					ay = Math.abs(p.y);
				if (ax <= this.limit && ay <= this.limit) return 'center';
				return ax >= ay
					? p.x > 0
						? 'right'
						: 'left'
					: p.y > 0
						? 'top'
						: 'bottom';
			}

			tap(delta) {
				return (
					Math.abs(delta.x) <= this.unit &&
					Math.abs(delta.y) <= this.unit
				);
			}

			direction(d) {
				const ax = Math.abs(d.x),
					ay = Math.abs(d.y);
				return ax >= ay
					? d.x > 0
						? 'right'
						: 'left'
					: d.y > 0
						? 'up'
						: 'down';
			}

			read(t0, t1) {
				const delta = { x: t1.x - t0.x, y: t1.y - t0.y };
				const zone = this.zone(t0);
				if (this.tap(delta))
					return { t0, t1, delta, zone, gesture: false };
				return {
					t0,
					t1,
					delta,
					zone,
					gesture: true,
					direction: this.direction(delta),
				};
			}
		}

		class Input {
			constructor(el) {
				this.el = el;
				this.co = new Coordinates();
				this.co.measure(el);
				this.active = new Map();
				this.h = new Map();
				const o = { passive: true };
				el.addEventListener('pointerdown', this, o);
				el.addEventListener('pointerup', this, o);
				el.addEventListener('pointercancel', this, o);
				for (const ev of ['resize', 'scroll', 'orientationchange'])
					addEventListener(ev, () => this.co.measure(el), {
						passive: true,
					});
			}

			handleEvent(e) {
				if (e.type === 'pointerdown') this.down(e);
				else if (e.type === 'pointerup') this.up(e);
				else if (e.type === 'pointercancel') this.cancel(e);
			}

			down({ pointerId, clientX, clientY }) {
				this.el.setPointerCapture?.(pointerId);
				this.active.set(pointerId, this.co.at(clientX, clientY));
			}

			up({ pointerId, clientX, clientY }) {
				const t0 = this.active.get(pointerId);
				if (!t0) return;
				this.active.delete(pointerId);
				const result = this.co.read(t0, this.co.at(clientX, clientY));
				this.fire(result.gesture ? 'swipe' : 'tap', {
					...result,
					id: pointerId,
				});
			}

			cancel({ pointerId, clientX, clientY }) {
				const t0 = this.active.get(pointerId);
				if (!t0) return;
				this.active.delete(pointerId);
				const result = this.co.read(t0, this.co.at(clientX, clientY));
				if (result.gesture)
					this.fire('swipe', {
						...result,
						id: pointerId,
						viaCancel: true,
					});
			}

			on(name, fn) {
				let s = this.h.get(name);
				if (!s) this.h.set(name, (s = new Set()));
				s.add(fn);
				return this;
			}

			off(name, fn) {
				if (fn) this.h.get(name)?.delete(fn);
				else this.h.delete(name);
				return this;
			}

			fire(name, info) {
				const s = this.h.get(name);
				if (s) for (const f of s) f(info);
			}

			reveal({ onReveal, onDismiss } = {}) {
				this.on('swipe', (i) => {
					if (i.zone === 'bottom' && i.direction === 'up')
						onReveal?.(i);
					else if (i.direction === 'down') onDismiss?.(i);
				});
				return this;
			}

			swipeNav({ prev, next } = {}) {
				this.on('swipe', (i) => {
					if (i.direction === 'left') next?.(i);
					else if (i.direction === 'right') prev?.(i);
				});
				return this;
			}

			tapNav({ prev, next } = {}) {
				this.on('tap', (i) => {
					if (i.zone === 'left') prev?.(i);
					else if (i.zone === 'right') next?.(i);
				});
				return this;
			}

			pullToRefresh(onRefresh) {
				this.on('swipe', (i) => {
					if (i.zone === 'top' && i.direction === 'down')
						onRefresh?.(i);
				});
				return this;
			}

			scroll(axis = 'y') {
				const y = axis === 'y';
				const edge = ((1 - this.co.limit) / 2) * 100;
				const mid = 100 - 2 * edge;
				this.el.style.cssText += ';position:relative;touch-action:auto';
				for (const [a, b, action] of [
					[0, edge, 'none'],
					[edge, mid, `pan-${axis}`],
					[100 - edge, edge, 'none'],
				]) {
					const d = document.createElement('div');
					d.style.cssText = y
						? `position:absolute;left:0;width:100%;top:${a}%;height:${b}%;touch-action:${action}`
						: `position:absolute;top:0;height:100%;left:${a}%;width:${b}%;touch-action:${action}`;
					this.el.appendChild(d);
				}
				return this;
			}
		}
	}
</script>
