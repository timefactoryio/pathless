<script>
	{
		class Coordinates {
			static zero(x = null, y = null) {
				return { x, y };
			}
			constructor() {
				this.limit = 0.75;
				this.unit = 0.1;
			}

			measure(el) {
				const r = el.getBoundingClientRect();
				this.L = r.left;
				this.T = r.top;
				this.W = r.width || 1;
				this.H = r.height || 1;
				this.origin = [this.L + this.W / 2, this.T + this.H / 2];
			}

			at(clientX, clientY) {
				const u = (clientX - this.L) / this.W,
					v = (clientY - this.T) / this.H;
				return Coordinates.zero(2 * u - 1, 1 - 2 * v);
			}
			zone(p) {
				const ax = Math.abs(p.x),
					ay = Math.abs(p.y);
				if (ax <= this.limit && ay <= this.limit) return 'center';
				return ax >= ay
					? p.x > 0
						? 'right'
						: 'left'
					: p.y > 0
						? 'top'
						: 'bottom';
			}

			tap(delta) {
				return (
					Math.abs(delta.x) <= this.unit &&
					Math.abs(delta.y) <= this.unit
				);
			}

			direction(d) {
				const ax = Math.abs(d.x),
					ay = Math.abs(d.y);
				return ax >= ay
					? d.x > 0
						? 'right'
						: 'left'
					: d.y > 0
						? 'up'
						: 'down';
			}

			read(t0, t1) {
				const delta = { x: t1.x - t0.x, y: t1.y - t0.y };
				const zone = this.zone(t0);
				if (this.tap(delta))
					return { t0, t1, delta, zone, gesture: false };
				return {
					t0,
					t1,
					delta,
					zone,
					gesture: true,
					direction: this.direction(delta),
				};
			}
		}

		class Input {
			constructor() {
				const { el, space, panel } = pathless.universe;
				this.space = space;
				this.panel = panel;
				this.co = space.map((s) => {
					const c = new Coordinates();
					c.measure(s.el);
					return c;
				});
				this.active = new Map(); // pointerId → { t0, i }
				this.h = new Map();
				const o = { passive: true };
				el.addEventListener('pointerdown', this, o);
				el.addEventListener('pointerup', this, o);
				el.addEventListener('pointercancel', this, o);
				for (const ev of ['resize', 'orientationchange'])
					addEventListener(
						ev,
						() => this.co.forEach((c, i) => c.measure(space[i].el)),
						{ passive: true },
					);
				this.#wire();
			}
			#indexOf(target) {
				const el = target.closest('#zero, #fx, #one');
				return el ? this.space.findIndex((s) => s.el === el) : -1;
			}

			handleEvent(e) {
				if (e.type === 'pointerdown') this.down(e);
				else if (e.type === 'pointerup') this.up(e);
				else if (e.type === 'pointercancel') this.cancel(e);
			}

			down({ pointerId, clientX, clientY, target }) {
				const i = this.#indexOf(target);
				if (i === -1) return;
				this.active.set(pointerId, {
					t0: this.co[i].at(clientX, clientY),
					i,
				});
			}
			up({ pointerId, clientX, clientY }) {
				const a = this.active.get(pointerId);
				if (!a) return;
				this.active.delete(pointerId);
				const result = this.co[a.i].read(
					a.t0,
					this.co[a.i].at(clientX, clientY),
				);
				this.fire(result.gesture ? 'swipe' : 'tap', {
					...result,
					id: pointerId,
					i: a.i,
				});
			}

			cancel({ pointerId, clientX, clientY }) {
				const t0 = this.active.get(pointerId);
				if (!t0) return;
				this.active.delete(pointerId);
				const result = this.co.read(t0, this.co.at(clientX, clientY));
				if (result.gesture)
					this.fire('swipe', {
						...result,
						id: pointerId,
						viaCancel: true,
					});
			}

			on(name, fn) {
				let s = this.h.get(name);
				if (!s) this.h.set(name, (s = new Set()));
				s.add(fn);
				return this;
			}

			off(name, fn) {
				if (fn) this.h.get(name)?.delete(fn);
				else this.h.delete(name);
				return this;
			}

			fire(name, info) {
				const s = this.h.get(name);
				if (s) for (const f of s) f(info);
			}

			#wire() {
				this.on('swipe', (e) => {
					if (e.direction === 'left') pathless.nav(1, e.i);
					else if (e.direction === 'right') pathless.nav(-1, e.i);
					else if (e.zone === 'bottom' && e.direction === 'up')
						this.panel.hidden = false;
					else if (e.direction === 'down') this.panel.hidden = true;
				});
			}

			tapNav(i, { prev, next } = {}) {
				this.on('tap', (e) => {
					if (e.i !== i) return;
					if (e.zone === 'left') prev?.(e);
					else if (e.zone === 'right') next?.(e);
				});
				return this;
			}
		}
		pathless.input = new Input();
	}
</script>
