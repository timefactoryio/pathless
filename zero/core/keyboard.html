<style>
	.keyboard {
		display: grid;
		grid-template-columns: repeat(3, 1fr);
		grid-template-rows: repeat(2, 1fr);
		gap: 0.3em;
		padding: 0.2em;
		width: 100%;
		height: 100%;
	}
	.key {
		display: flex;
		flex-direction: column;
		border: medium solid #444;
		border-radius: 3px;
		overflow: hidden;
		cursor: pointer;
		color: #aaa;
	}
	.key[data-key='q'] {
		border-color: red;
	}
	.key[data-key='e'] {
		border-color: blue;
	}
	.key.down {
		border-color: white;
	}
	.key .top {
		flex: 1;
		display: flex;
		align-items: center;
		justify-content: center;
		font-size: 0.8em;
	}
	.key .bottom {
		flex: 4;
		display: flex;
		align-items: center;
		justify-content: center;
		font-size: 1.25em;
		font-weight: bold;
		color: #fff;
	}
</style>

<div class="keyboard">
	<div class="key" data-key="1">
		<div class="top">1</div>
		<div class="bottom"></div>
	</div>
	<div class="key" data-key="2">
		<div class="top">2</div>
		<div class="bottom"></div>
	</div>
	<div class="key" data-key="3">
		<div class="top">3</div>
		<div class="bottom"></div>
	</div>
	<div class="key" data-key="Tab">
		<div class="top">Tab</div>
		<div class="bottom"></div>
	</div>
	<div class="key" data-key="q">
		<div class="top">q</div>
		<div class="bottom"></div>
	</div>
	<div class="key" data-key="e">
		<div class="top">e</div>
		<div class="bottom"></div>
	</div>
</div>

<script>
	pathless.universe.addEventListener('input', (e) => {
		const { key, phase } = e.detail;
		document
			.querySelector(`.key[data-key="${key}"]`)
			?.classList.toggle('down', phase === 'down');
	});
</script>
