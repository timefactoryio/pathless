<script>
	{
		class Mobile {
			#starts = new Map();

			constructor() {
				const w = (t, fn, o) => window.addEventListener(t, fn, o);
				w('pointerdown', (e) =>
					this.#starts.set(e.pointerId, {
						x: e.clientX,
						y: e.clientY,
					}),
				);
				w('pointerup', (e) => this.#end(e));
				w('pointercancel', (e) => this.#starts.delete(e.pointerId));
			}

			#end(e) {
				const s = this.#starts.get(e.pointerId);
				if (!s) return;
				this.#starts.delete(e.pointerId);
				const dx = e.clientX - s.x,
					dy = e.clientY - s.y;
				const dist = Math.hypot(dx, dy);

				if (dist > 40 && Math.abs(dx) > Math.abs(dy))
					return pathless.input.fire(
						dx < 0 ? 'swipeLeft' : 'swipeRight',
					);

				if (dist < 10) {
					const i = this.#spaceAt(e.clientX, e.clientY);
					if (i !== -1)
						pathless.input.fire(
							this.#localX(e.clientX, i) < 0.5
								? 'tapLeft'
								: 'tapRight',
						);
				}
			}

			#spaceAt(x, y) {
				for (let i = 0; i < pathless.els.length; i++) {
					if (pathless.els[i].hidden) continue;
					const r = pathless.els[i].getBoundingClientRect();
					if (
						x >= r.left &&
						x <= r.right &&
						y >= r.top &&
						y <= r.bottom
					)
						return i;
				}
				return -1;
			}

			#localX(x, i) {
				const r = pathless.els[i].getBoundingClientRect();
				return (x - r.left) / r.width;
			}
		}

		pathless.mobile = new Mobile();
	}
</script>
