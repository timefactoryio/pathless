<script>
	{
		class Input {
			#pointers = new Map();
			#keys = new Map();

			constructor() {
				const w = (t, fn, o) => window.addEventListener(t, fn, o);
				w('keydown', (e) => this.#key(e, true));
				w('keyup', (e) => this.#key(e, false));
				w('pointerdown', (e) => {
					const i = this.#spaceAt(e.clientX, e.clientY);
					const r =
						i === -1
							? null
							: pathless.spaces[i].el.getBoundingClientRect();
					this.#pointers.set(e.pointerId, {
						x: e.clientX,
						y: e.clientY,
						space: i,
						mid: r ? r.left + r.width / 2 : 0,
					});
				});
				w('pointerup', (e) => this.#end(e));
				w('pointercancel', (e) => this.#pointers.delete(e.pointerId));

				const f = () => pathless.universe.focused;
				const K = {
					1: () => pathless.cycle(0),
					2: () => pathless.cycle(1),
					3: () => pathless.cycle(2),
					tab: (e) => (e.preventDefault(), pathless.focus()),
					q: () => pathless.nav(-1, f()),
					e: () => pathless.nav(1, f()),
					a: () => pathless.tap(f(), 'left'),
					d: () => pathless.tap(f(), 'right'),
					z: () => pathless.toggle(),
				};
				for (const [key, fn] of Object.entries(K))
					this.#keys.set(key, fn);
			}

			#key(e, down) {
				const fn = this.#keys.get(e.key.toLowerCase());
				if (!fn) return;
				e.preventDefault();
				this.#flash(e.key.toLowerCase(), down); // visual only
				if (down) fn(e); // logic, synchronous
			}

			#end(e) {
				const s = this.#pointers.get(e.pointerId);
				if (!s) return;
				this.#pointers.delete(e.pointerId);
				if (s.space === -1) return;

				pathless.focus(s.space, false); // touch is self-addressing: focus follows

				const dx = e.clientX - s.x,
					dy = e.clientY - s.y;
				if (Math.hypot(dx, dy) > 40) {
					if (Math.abs(dx) > Math.abs(dy)) {
						const dir = dx < 0 ? -1 : 1;
						this.#pulse(dir < 0 ? 'q' : 'e');
						pathless.nav(dir, s.space);
					}
				} else {
					const side = e.clientX < s.mid ? 'left' : 'right';
					this.#pulse(side === 'left' ? 'a' : 'd');
					pathless.tap(s.space, side);
				}
			}

			#spaceAt(x, y) {
				for (let i = 0; i < pathless.spaces.length; i++) {
					const el = pathless.spaces[i].el;
					if (el.hidden) continue;
					const r = el.getBoundingClientRect();
					if (
						x >= r.left &&
						x <= r.right &&
						y >= r.top &&
						y <= r.bottom
					)
						return i;
				}
				return -1;
			}

			#flash(key, on) {
				window.dispatchEvent(
					new CustomEvent('reflect', {
						detail: { key, state: on },
					}),
				);
			}
			// pulse = visual blip for a one-shot gesture; gates no logic
			#pulse(key) {
				this.#flash(key, true);
				setTimeout(() => this.#flash(key, false), 120);
			}
		}

		pathless.input = new Input();
	}
</script>
