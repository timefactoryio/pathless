<script>
	{
		class Input {
			#actions = new Map();

			constructor() {
				const w = (t, fn, o) => window.addEventListener(t, fn, o);
				w('keydown', (e) => this.#key(e, true));
				w('keyup', (e) => this.#key(e, false));
				w('click', (e) => this.fire('tap', e.target));
				w('pointerdown', (e) => {
					const i = this.#spaceAt(e.clientX, e.clientY);
					this.#actions.set(e.pointerId, {
						x: e.clientX,
						y: e.clientY,
						space: i,
					});
				});
				w('pointerup', (e) => this.#end(e));
				w('pointercancel', (e) => this.#actions.delete(e.pointerId));

				this.register({ key: '1', down: () => pathless.cycle(0) });
				this.register({ key: '2', down: () => pathless.cycle(1) });
				this.register({ key: '3', down: () => pathless.cycle(2) });
				this.register({
					key: 'tab',
					down: (e) => (e.preventDefault(), pathless.focus()),
				});
				this.register({
					key: 'q',
					gesture: 'swipeLeft',
					down: () => pathless.nav(-1),
				});
				this.register({
					key: 'e',
					gesture: 'swipeRight',
					down: () => pathless.nav(1),
				});
				this.register({ key: 'z', down: () => pathless.toggle() });
			}

			register(k) {
				if (k.key) this.#actions.set(k.key.toLowerCase(), k);
				if (k.gesture) this.#actions.set(k.gesture, k);
			}

			clear(i) {
				for (const [n, k] of this.#actions)
					if (k.space === i) this.#actions.delete(n);
			}

			#key(e, down) {
				const k = this.#actions.get(e.key.toLowerCase());
				if (!k) return;
				e.preventDefault();
				k.state = down;
				this.#reflect(k.key, down);
				(down ? k.down : k.up)?.(e);
			}

			#end(e) {
				const s = this.#actions.get(e.pointerId);
				if (!s) return;
				this.#actions.delete(e.pointerId);
				const dx = e.clientX - s.x,
					dy = e.clientY - s.y;
				if (Math.hypot(dx, dy) > 40) {
					if (s.space !== -1) pathless.focus(s.space, false); // focus without re-render
					this.#swipe(dx, dy); // nav() will render
				}
			}

			#swipe(dx, dy) {
				if (Math.abs(dx) > Math.abs(dy))
					this.fire(dx < 0 ? 'swipeLeft' : 'swipeRight');
			}

			#spaceAt(x, y) {
				for (let i = 0; i < pathless.spaces.length; i++) {
					if (pathless.spaces[i].el.hidden) continue;
					const r = pathless.spaces[i].el.getBoundingClientRect();
					if (
						x >= r.left &&
						x <= r.right &&
						y >= r.top &&
						y <= r.bottom
					)
						return i;
				}
				return -1;
			}

			#reflect(key, state) {
				window.dispatchEvent(
					new CustomEvent('reflect', { detail: { key, state } }),
				);
			}

			fire(name, ctx) {
				const k = this.#actions.get(name);
				if (!k) return;
				k.state = true;
				this.#reflect(k.key, true);
				k.down?.(ctx);
				k.up
					? setTimeout(() => {
							k.up?.(ctx);
							k.state = false;
							this.#reflect(k.key, false);
						}, 120)
					: ((k.state = false), this.#reflect(k.key, false));
			}
		}

		pathless.input = new Input();
	}
</script>
