<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>hello.universe</title>
		<style>
			:root {
				--b: 1px solid blue;
			}
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
				user-select: none;
				-webkit-user-select: none;
				scrollbar-width: none;
			}
			[hidden] {
				display: none !important;
			}
			body {
				height: 100dvh;
				overflow: hidden;
				font-family: sans-serif;
				background: #000;
				color: #fff;
				display: flex;
				border: var(--b);
				border-radius: 5px;
				text-decoration: none;
			}
			#universe {
				flex: 1;
				display: flex;
			}
			:is(#zero, #fx, #one) {
				flex: 1;
				overflow: hidden;
				container-type: size;
				position: relative;
				isolation: isolate;
				display: flex;
				flex-direction: column;
			}
			:is(#zero, #fx, #one) > * {
				width: 100%;
			}
			:is(#zero, #fx, #one) > :first-child {
				flex: 1;
				min-height: 0;
			}
			#zero {
				grid-area: zero;
				container-name: zero;
			}
			#fx {
				grid-area: fx;
				container-name: fx;
			}
			#one {
				grid-area: one;
				container-name: one;
			}
			#universe[data-layout='1'][data-variant='0'] #zero,
			#universe[data-layout='2'][data-variant='0'] #zero {
				border-right: var(--b);
			}
			#universe[data-layout='1'][data-variant='1'] #zero,
			#universe[data-layout='2'][data-variant='1'] #zero {
				border-bottom: var(--b);
			}
			#universe[data-layout='2'][data-variant='2'] #zero {
				border-left: var(--b);
			}
			#universe[data-layout='2'][data-variant='3'] #zero {
				border-top: var(--b);
			}
			#universe[data-layout='1'][data-variant='1'] {
				flex-direction: column;
			}
			#universe[data-layout='2'] {
				display: grid;
				grid-template-columns: 1fr 1fr;
				grid-template-rows: 1fr 1fr;
			}
			#universe[data-layout='2'][data-variant='0'] {
				grid-template-areas: 'zero one' 'zero fx';
			}
			#universe[data-layout='2'][data-variant='1'] {
				grid-template-areas: 'zero zero' 'one  fx';
			}
			#universe[data-layout='2'][data-variant='2'] {
				grid-template-areas: 'one  zero' 'fx   zero';
			}
			#universe[data-layout='2'][data-variant='3'] {
				grid-template-areas: 'one  fx' 'zero zero';
			}
			#universe[data-layout='2'][data-variant='1'] #fx,
			#universe[data-layout='2'][data-variant='3'] #fx {
				border-left: var(--b);
			}
		</style>
		<script>
			class Universe {
				#td = new TextDecoder();
				#focused = 0;
				#frameIndex = [0, 0, 0];
				#state = [];
				#prev = null;

				constructor() {
					this.universe = document.getElementById('universe');
					this.spaces = ['zero', 'fx', 'one'].map((id) =>
						document.getElementById(id),
					);
					this.init();
				}

				wire(buf) {
					const bytes = new Uint8Array(buf);
					let pos = 4 + new DataView(buf).getUint32(0);
					return JSON.parse(
						this.#td.decode(bytes.subarray(4, pos)),
					).map((e) => ({
						...e,
						data: bytes.subarray(pos, (pos += e.size)),
					}));
				}

				async init() {
					const buf = await fetch('{{.APIURL}}').then((r) =>
						r.arrayBuffer(),
					);
					const frames = this.wire(buf).map((e) =>
						this.#td.decode(e.data),
					);
					this.frames = frames;
					this.#state = this.spaces.map(() =>
						frames.map(() => new Map()),
					);
					this.sync();
					this.render();
				}

				get space() {
					return this.spaces[this.#focused];
				}
				get layout() {
					return +this.universe.dataset.layout;
				}
				set layout(v) {
					this.universe.dataset.layout = v;
				}
				get variant() {
					return +this.universe.dataset.variant;
				}
				set variant(v) {
					this.universe.dataset.variant = v;
				}

				get #entry() {
					return this.#state[this.#focused][
						this.#frameIndex[this.#focused]
					];
				}

				write(key, value) {
					this.#entry.set(key, value);
				}

				read() {
					return Object.fromEntries(this.#entry);
				}

				nav(dir) {
					this.#frameIndex[this.#focused] =
						(this.#frameIndex[this.#focused] +
							dir +
							this.frames.length) %
						this.frames.length;
					this.render();
				}

				render(i = this.#focused) {
					const el = this.spaces[i];
					el.innerHTML = this.frames[this.#frameIndex[i]];
					el.querySelectorAll('script,style').forEach((old) => {
						const n = document.createElement(old.localName);
						[...old.attributes].forEach(({ name, value }) =>
							n.setAttribute(name, value),
						);
						n.textContent = old.textContent;
						old.replaceWith(n);
					});
				}

				sync() {
					const l = this.layout;
					[false, l < 1, l < 2].forEach(
						(h, i) => (this.spaces[i].hidden = h),
					);
					if (this.space.hidden) {
						this.#focused = 0;
						this.render();
					}
				}

				cycle(layout = this.layout) {
					if (layout !== this.layout) {
						this.#prev = this.layout;
						this.layout = layout;
						this.variant = 0;
					} else if (layout === 0) {
						this.layout = this.#prev ?? 2;
						this.variant = 0;
					} else {
						this.variant =
							(this.variant + 1) % [1, 2, 4][this.layout];
					}
					this.sync();
				}

				focus() {
					do {
						this.#focused =
							(this.#focused + 1) % this.spaces.length;
					} while (this.space.hidden);
					this.render();
				}
			}

			document.addEventListener('DOMContentLoaded', () => {
				window.pathless = new Universe();
			});
		</script>
	</head>
	<body>
		<div id="universe" data-layout="0" data-variant="0">
			<div id="zero"></div>
			<div id="fx" hidden></div>
			<div id="one" hidden></div>
		</div>
	</body>
</html>
