<div id="universe" data-layout="0" data-variant="0">
	<style>
		#universe {
			flex: 1;
			min-height: 0;
			display: flex;
		}
		:is(#zero, #fx, #one) {
			flex: 1;
			overflow: hidden;
			container-type: size;
			position: relative;
			isolation: isolate;
			display: flex;
			flex-direction: column;
			touch-action: none;
			overscroll-behavior: none;
		}
		:is(#zero, #fx, #one) > * {
			width: 100%;
		}
		:is(#zero, #fx, #one) > :first-child {
			flex: 1;
			min-height: 0;
		}
		#zero {
			grid-area: zero;
			container-name: zero;
		}
		#fx {
			grid-area: fx;
			container-name: fx;
		}
		#one {
			grid-area: one;
			container-name: one;
		}
		#universe[data-layout='1'][data-variant='1'] {
			flex-direction: column;
		}
		#universe[data-layout='2'] {
			display: grid;
			grid-template-columns: 1fr 1fr;
			grid-template-rows: 1fr 1fr;
		}
		#universe[data-layout='2'][data-variant='0'] {
			grid-template-areas: 'zero fx' 'zero one';
		}
		#universe[data-layout='2'][data-variant='1'] {
			grid-template-areas: 'zero zero' 'one  fx';
		}
		#universe[data-layout='2'][data-variant='2'] {
			grid-template-areas: 'one  zero' 'fx   zero';
		}
		#universe[data-layout='2'][data-variant='3'] {
			grid-template-areas: 'fx   one' 'zero zero';
		}
		#universe:not([data-layout='0'])[data-variant='0'] #zero {
			border-right: var(--b);
		}
		#universe:not([data-layout='0'])[data-variant='1'] #zero {
			border-bottom: var(--b);
		}
		#universe[data-layout='2'][data-variant='2'] #zero {
			border-left: var(--b);
		}
		#universe[data-layout='2'][data-variant='3'] #zero {
			border-top: var(--b);
		}
		#universe[data-layout='2'][data-variant='0'] #fx {
			border-bottom: var(--b);
		}
		#universe[data-layout='2'][data-variant='1'] #fx {
			border-left: var(--b);
		}
		#universe[data-layout='2'][data-variant='2'] #fx {
			border-top: var(--b);
		}
		#universe[data-layout='2'][data-variant='3'] #fx {
			border-right: var(--b);
		}
		#panel {
			position: fixed;
			inset: 0;
			z-index: 10;
			touch-action: none;
			overscroll-behavior: none;
		}
	</style>
	<div id="zero"></div>
	<div id="fx" hidden></div>
	<div id="one" hidden></div>
</div>

<script></script>
