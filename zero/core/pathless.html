<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1.0" />
		<title>hello.universe</title>
		<style>
			:root {
				--b: 1px solid blue;
			}
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
				user-select: none;
				-webkit-user-select: none;
				scrollbar-width: none;
			}
			[hidden] {
				display: none !important;
			}
			body {
				height: 100dvh;
				overflow: hidden;
				font-family: sans-serif;
				background: #000;
				color: #fff;
				display: flex;
				border: var(--b);
				border-radius: 5px;
			}
			#universe {
				flex: 1;
				display: flex;
			}
			:is(#zero, #fx, #one) {
				flex: 1;
				overflow: hidden;
				container-type: size;
				position: relative;
				isolation: isolate;
				display: flex;
				flex-direction: column;
			}
			:is(#zero, #fx, #one) > * {
				width: 100%;
			}
			:is(#zero, #fx, #one) > :first-child {
				flex: 1;
				min-height: 0;
			}
			:is(#zero, #fx, #one):has(#panel:not([hidden])) > :first-child {
				flex: 0 0 80cqh;
			}
			#zero {
				grid-area: zero;
				container-name: zero;
			}
			#fx {
				grid-area: fx;
				container-name: fx;
			}
			#one {
				grid-area: one;
				container-name: one;
			}
			#universe[data-layout='1'][data-variant='1'] {
				flex-direction: column;
			}
			#universe[data-layout='2'] {
				display: grid;
				grid-template-columns: 1fr 1fr;
				grid-template-rows: 1fr 1fr;
			}
			#universe[data-layout='2'][data-variant='0'] {
				grid-template-areas: 'zero fx' 'zero one';
			}
			#universe[data-layout='2'][data-variant='1'] {
				grid-template-areas: 'zero zero' 'one  fx';
			}
			#universe[data-layout='2'][data-variant='2'] {
				grid-template-areas: 'one  zero' 'fx   zero';
			}
			#universe[data-layout='2'][data-variant='3'] {
				grid-template-areas: 'fx   one' 'zero zero';
			}
			#universe:not([data-layout='0'])[data-variant='0'] #zero {
				border-right: var(--b);
			}
			#universe:not([data-layout='0'])[data-variant='1'] #zero {
				border-bottom: var(--b);
			}
			#universe[data-layout='2'][data-variant='2'] #zero {
				border-left: var(--b);
			}
			#universe[data-layout='2'][data-variant='3'] #zero {
				border-top: var(--b);
			}
			#universe[data-layout='2'][data-variant='0'] #fx {
				border-bottom: var(--b);
			}
			#universe[data-layout='2'][data-variant='1'] #fx {
				border-left: var(--b);
			}
			#universe[data-layout='2'][data-variant='2'] #fx {
				border-top: var(--b);
			}
			#universe[data-layout='2'][data-variant='3'] #fx {
				border-right: var(--b);
			}
			#panel {
				height: 20cqh;
				flex-shrink: 0;
				border-top: var(--b);
				display: flex;
				align-items: center;
				justify-content: center;
			}
		</style>
		<script>
			window.apiUrl = '{{.APIURL}}';
			class Universe {
				#td = new TextDecoder();
				#prev = [0, 0];
				frames = [];
				constructor() {
					this.universe = document.getElementById('universe');
					this.spaces = ['zero', 'fx', 'one'].map((id) => ({
						el: document.getElementById(id),
						frameIndex: 0,
					}));
					this.panel = Object.assign(document.createElement('div'), {
						id: 'panel',
						hidden: true,
					});
					this.keys = [
						this.key('1', () => this.cycle(0)),
						this.key('2', () => this.cycle(1)),
						this.key('3', () => this.cycle(2)),
						this.key(
							'tab',
							(e) => (e.preventDefault(), this.focus()),
						),
						this.key('q', () => this.nav(-1), { desc: 'back' }),
						this.key('e', () => this.nav(1), { desc: 'next' }),
						this.key('z', () => this.toggle()),
					];
					this.init();
					window.addEventListener('keydown', this.handle);
					window.addEventListener('keyup', this.handle);
				}

				handle = (e) => {
					const key = e.key.toLowerCase();
					const o =
						this.keys.find((o) => o.key === key) ??
						this.frame?.binds?.find((o) => o.key === key);
					if (!o) return;
					o.state = e.type === 'keydown';
					(o.state ? o.down : o.up)?.(e);
				};

				wire(buf) {
					const bytes = new Uint8Array(buf);
					let pos = 4 + new DataView(buf).getUint32(0);
					return JSON.parse(
						this.#td.decode(bytes.subarray(4, pos)),
					).map((e) => ({
						...e,
						data: bytes.subarray(pos, (pos += e.size)),
					}));
				}

				async init() {
					const [keyboard, ...rest] = this.wire(
						await fetch(window.apiUrl).then((r) => r.arrayBuffer()),
					);
					this.panel.innerHTML = this.#td.decode(keyboard.data);
					this.exec(this.panel);
					this.frames = rest.map((e) => ({
						html: this.#td.decode(e.data),
						binds: [],
					}));
					for (const s of this.spaces)
						s.state = Array.from(
							{ length: this.frames.length },
							() => new Map(),
						);
					if (this.frames.length) this.render();
				}

				get focused() {
					return +this.universe.dataset.focused;
				}
				set focused(v) {
					let i = v % this.spaces.length;
					while (this.spaces[i].el.hidden)
						i = (i + 1) % this.spaces.length;
					this.universe.dataset.focused = i;
					this.spaces.forEach((s, j) => {
						s.el.inert = !s.el.hidden && j !== i;
					});
				}
				get layout() {
					return +this.universe.dataset.layout;
				}
				get variant() {
					return +this.universe.dataset.variant;
				}
				get view() {
					return [this.layout, this.variant];
				}
				set view([l, v]) {
					this.#prev = this.view;
					this.universe.dataset.layout = l;
					this.universe.dataset.variant = v;
				}
				get space() {
					return this.spaces[this.focused];
				}
				get frame() {
					return this.frames[this.space.frameIndex];
				}
				get state() {
					return this.space.state[this.space.frameIndex];
				}

				read() {
					return Object.fromEntries(this.state);
				}
				write(k, v) {
					this.state.set(k, v);
				}

				key(k, down, { up = null, desc = '' } = {}) {
					return {
						key: k.toLowerCase(),
						down,
						up,
						desc,
						state: false,
					};
				}
				register(i, keys) {
					if (!this.frames[i]?.binds.length)
						this.frames[i].binds = keys;
				}

				sync() {
					this.spaces.forEach((s, i) => {
						const was = s.el.hidden;
						s.el.hidden =
							this.layout === 0
								? i !== this.focused
								: i > this.layout;
						if (was && !s.el.hidden) this.render(s);
					});
					this.focused = this.focused;
					this.render();
				}

				render(s = this.space) {
					const f = this.frames[s.frameIndex];
					s.el.innerHTML = f.html;
					if (!f.binds.length) this.exec(s.el);
					if (s === this.spaces[0])
						this.spaces[0].el.appendChild(this.panel);
				}

				exec(el) {
					for (const old of el.querySelectorAll('script, style')) {
						const fresh = document.createElement(old.localName);
						for (const { name, value } of old.attributes)
							fresh.setAttribute(name, value);
						fresh.textContent = old.textContent;
						old.replaceWith(fresh);
					}
				}

				cycle(layout = this.layout) {
					if (layout !== this.layout) {
						this.view = [layout, 0];
					} else if (layout === 0) {
						this.view = this.#prev;
					} else {
						this.view = [
							this.layout,
							(this.variant + 1) % [1, 2, 4][layout],
						];
						return this.render();
					}
					this.sync();
				}

				nav(dir) {
					this.space.frameIndex =
						(this.space.frameIndex + dir + this.frames.length) %
						this.frames.length;
					this.render();
				}

				focus() {
					this.focused = this.focused + 1;
					this.render();
				}
				toggle() {
					this.panel.hidden = !this.panel.hidden;
					if (!this.panel.hidden)
						this.space.el.appendChild(this.panel);
				}
			}
			document.addEventListener('DOMContentLoaded', () => {
				window.pathless = new Universe();
			});
		</script>
	</head>
	<body>
		<div id="universe" data-layout="0" data-variant="0" data-focused="0">
			<div id="zero"></div>
			<div id="fx" hidden></div>
			<div id="one" hidden></div>
		</div>
	</body>
</html>
