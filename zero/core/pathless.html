<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1.0" />
		<title>hello.universe</title>
		<style>
			:root {
				--b: 1px solid blue;
			}
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
				user-select: none;
				-webkit-user-select: none;
				scrollbar-width: none;
			}
			[hidden] {
				display: none !important;
			}
			body {
				height: 100dvh;
				overflow: hidden;
				font-family: sans-serif;
				background: #000;
				color: #fff;
				display: flex;
				border: var(--b);
				border-radius: 5px;
			}
			#universe {
				flex: 1;
				display: flex;
			}
			:is(#zero, #fx, #one) {
				flex: 1;
				overflow: hidden;
				container-type: size;
				position: relative;
				isolation: isolate;
				display: flex;
				flex-direction: column;
			}
			:is(#zero, #fx, #one) > * {
				width: 100%;
			}
			:is(#zero, #fx, #one) > :first-child {
				flex: 1;
				min-height: 0;
			}
			:is(#zero, #fx, #one):has(#panel:not([hidden])) > :first-child {
				flex: 0 0 80cqh;
			}
			#zero {
				grid-area: zero;
				container-name: zero;
			}
			#fx {
				grid-area: fx;
				container-name: fx;
			}
			#one {
				grid-area: one;
				container-name: one;
			}
			#universe[data-layout='1'][data-variant='1'] {
				flex-direction: column;
			}
			#universe[data-layout='2'] {
				display: grid;
				grid-template-columns: 1fr 1fr;
				grid-template-rows: 1fr 1fr;
			}
			#universe[data-layout='2'][data-variant='0'] {
				grid-template-areas: 'zero fx' 'zero one';
			}
			#universe[data-layout='2'][data-variant='1'] {
				grid-template-areas: 'zero zero' 'one  fx';
			}
			#universe[data-layout='2'][data-variant='2'] {
				grid-template-areas: 'one  zero' 'fx   zero';
			}
			#universe[data-layout='2'][data-variant='3'] {
				grid-template-areas: 'fx   one' 'zero zero';
			}
			#universe:not([data-layout='0'])[data-variant='0'] #zero {
				border-right: var(--b);
			}
			#universe:not([data-layout='0'])[data-variant='1'] #zero {
				border-bottom: var(--b);
			}
			#universe[data-layout='2'][data-variant='2'] #zero {
				border-left: var(--b);
			}
			#universe[data-layout='2'][data-variant='3'] #zero {
				border-top: var(--b);
			}
			#universe[data-layout='2'][data-variant='0'] #fx {
				border-bottom: var(--b);
			}
			#universe[data-layout='2'][data-variant='1'] #fx {
				border-left: var(--b);
			}
			#universe[data-layout='2'][data-variant='2'] #fx {
				border-top: var(--b);
			}
			#universe[data-layout='2'][data-variant='3'] #fx {
				border-right: var(--b);
			}
			#panel {
				height: 20cqh;
				flex-shrink: 0;
				border-top: var(--b);
				display: flex;
				align-items: center;
				justify-content: center;
			}
		</style>
		<script>
			class Universe {
				#td = new TextDecoder();
				#prev = [0, 0];
				constructor() {
					this.universe = document.getElementById('universe');
					this.spaces = ['zero', 'fx', 'one'].map((id) => ({
						el: document.getElementById(id),
						frameIndex: 0,
					}));
					window.apiUrl = '{{.APIURL}}';
					this.frames = [];
					this.panel = document.createElement('div');
					this.panel.id = 'panel';
					this.panel.hidden = true;
					this.spaces[0].el.appendChild(this.panel);
					this.keys = [
						this.key('1', () => this.cycle(0)),
						this.key('2', () => this.cycle(1)),
						this.key('3', () => this.cycle(2)),
						this.key('tab', (e) => {
							e.preventDefault();
							this.focus();
						}),
						this.key('q', () => this.nav(-1), {
							desc: 'back',
						}),
						this.key('e', () => this.nav(1), {
							desc: 'next',
						}),
						this.key('z', () => this.toggle()),
					];
					const handle = (e) => {
						const o = this.keys.find(
							(o) => o.key === e.key.toLowerCase(),
						);
						if (!o) return;
						o.state = e.type === 'keydown';
						(o.state ? o.down : o.up)?.(e);
					};
					window.addEventListener('keydown', handle);
					window.addEventListener('keyup', handle);
					this.init();
				}

				wire(buf) {
					const bytes = new Uint8Array(buf);
					let pos = 4 + new DataView(buf).getUint32(0);
					return JSON.parse(
						this.#td.decode(bytes.subarray(4, pos)),
					).map((e) => ({
						...e,
						data: bytes.subarray(pos, (pos += e.size)),
					}));
				}

				async init() {
					try {
						const [keyboard, ...rest] = this.wire(
							await fetch(window.apiUrl).then((r) =>
								r.arrayBuffer(),
							),
						);
						this.panel.innerHTML = this.#td.decode(keyboard.data);
						this.exec(this.panel);
						this.frames = rest.map((e) => [
							this.#td.decode(e.data),
							[],
						]);
					} catch (_) {}
					for (const s of this.spaces)
						s.state = Array.from(
							{ length: this.frames.length },
							() => new Map(),
						);
					if (this.frames.length) this.sync(this.space);
				}

				get focused() {
					return +this.universe.dataset.focused;
				}
				set focused(v) {
					this.universe.dataset.focused = v;
					this.spaces.forEach((s, i) => {
						s.el.inert = !s.el.hidden && i !== v;
					});
				}
				get layout() {
					return +this.universe.dataset.layout;
				}
				get variant() {
					return +this.universe.dataset.variant;
				}
				get view() {
					return [this.layout, this.variant];
				}
				set view([l, v]) {
					this.#prev = this.view;
					this.universe.dataset.layout = l;
					this.universe.dataset.variant = v;
				}
				get space() {
					return this.spaces[this.focused];
				}

				read() {
					const s = this.space;
					return Object.fromEntries(s.state[s.frameIndex]);
				}
				write(k, v) {
					const s = this.space;
					s.state[s.frameIndex].set(k, v);
				}

				key(k, down, { up = null, desc = '' } = {}) {
					return {
						key: k.toLowerCase(),
						down,
						up,
						desc,
						state: false,
					};
				}
				register(i, keys) {
					if (!this.frames[i]?.[1].length) this.frames[i][1] = keys;
				}
				sync(s) {
					s.el.innerHTML = this.frames[s.frameIndex][0];
					this.exec(s.el);
					this.keys.length = 7;
					this.keys.push(...(this.frames[s.frameIndex]?.[1] ?? []));
					if (s === this.spaces[0])
						this.spaces[0].el.appendChild(this.panel);
				}
				exec(el) {
					for (const old of el.querySelectorAll('script, style')) {
						const fresh = document.createElement(old.localName);
						for (const { name, value } of old.attributes)
							fresh.setAttribute(name, value);
						fresh.textContent = old.textContent;
						old.replaceWith(fresh);
					}
				}

				nav(dir) {
					const s = this.space;
					s.frameIndex =
						(s.frameIndex + dir + this.frames.length) %
						this.frames.length;
					this.sync(s);
				}
				focus() {
					if (this.spaces.every((s) => s.el.hidden)) return;
					let next = this.focused;
					do {
						next = (next + 1) % this.spaces.length;
					} while (this.spaces[next].el.hidden);
					this.focused = next;
					this.sync(this.space);
				}

				#reveal() {
					const prev = this.spaces.map((s) => s.el.hidden);
					this.spaces.forEach((s, i) => {
						s.el.hidden =
							this.layout === 0
								? i !== this.focused
								: i > this.layout;
						if (prev[i] && !s.el.hidden) this.sync(s);
					});
				}
				cycle(layout = this.layout) {
					if (layout !== this.layout) {
						this.view = [layout, 0];
					} else if (layout === 0) {
						this.view = this.#prev;
					} else {
						this.view = [
							this.layout,
							(this.variant + 1) % [1, 2, 4][layout],
						];
						return this.sync(this.space);
					}
					this.#reveal();
					const f = this.focused;
					this.focused = this.spaces[f].el.hidden
						? this.spaces.findIndex((s) => !s.el.hidden)
						: f;
					this.sync(this.space);
				}

				toggle() {
					this.panel.hidden = !this.panel.hidden;
				}
			}

			document.addEventListener('DOMContentLoaded', () => {
				const u = (window.pathless = new Universe());
				window.read = () => u.read();
				window.write = (k, v) => u.write(k, v);
				window.space = () => u.space;
				window.frame = () => u.space.el.firstElementChild;
				window.key = (k, d, o) => u.key(k, d, o);
				window.register = (i, keys) => u.register(i, keys);
				window.toggle = () => u.toggle();
			});
		</script>
	</head>
	<body>
		<div id="universe" data-layout="0" data-variant="0" data-focused="0">
			<div id="zero"></div>
			<div id="fx" hidden></div>
			<div id="one" hidden></div>
		</div>
	</body>
</html>
