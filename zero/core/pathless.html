<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>hello.universe</title>
		<style>
			:root {
				--b: 1px solid blue;
			}
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
				user-select: none;
				-webkit-user-select: none;
				scrollbar-width: none;
			}
			body {
				height: 100dvh;
				overflow: hidden;
				font-family: sans-serif;
				background: #000;
				color: #fff;
				display: flex;
				border: var(--b);
				border-radius: 5px;
				text-decoration: none;
			}
			#universe {
				flex: 1;
				display: flex;
			}
			:is(#zero, #fx, #one) {
				flex: 1;
				overflow: hidden;
				container-type: size;
				position: relative;
				isolation: isolate;
				display: flex;
				flex-direction: column;
			}
			:is(#zero, #fx, #one) > * {
				width: 100%;
			}
			:is(#zero, #fx, #one) > :first-child {
				flex: 1;
				min-height: 0;
			}
			#zero {
				grid-area: zero;
				container-name: zero;
			}
			#fx {
				grid-area: fx;
				container-name: fx;
			}
			#one {
				grid-area: one;
				container-name: one;
			}
		</style>
		<script>
			class Universe {
				#td = new TextDecoder();
				async #parse(url) {
					const buf = await window
						.fetch(url)
						.then((r) => r.arrayBuffer());
					const bytes = new Uint8Array(buf);
					let pos = 4 + new DataView(buf).getUint32(0);
					return JSON.parse(
						this.#td.decode(bytes.subarray(4, pos)),
					).map((e) => ({
						...e,
						data: bytes.subarray(pos, (pos += e.size)),
					}));
				}

				constructor() {
					this.universe = document.getElementById('universe');
					this.space = ['zero', 'fx', 'one'].map((id) =>
						document.getElementById(id),
					);
					this.init();
				}

				async init() {
					const [input, layout, keyboard, ...frames] = (
						await this.#parse('{{.APIURL}}')
					).map((e) => this.#td.decode(e.data));
					this.mount(document.head, input);
					this.mount(document.head, layout);
					// pathless.layouts.left = keyboard;
					// if (!frames.length) pathless.layouts.togglePanel();
					this.frames = frames;
				}

				mount(target, html) {
					target.append(
						document.createRange().createContextualFragment(html),
					);
				}

				render(i = +this.universe.dataset.focused) {
					const el = this.space[i];
					el.replaceChildren();
					this.mount(el, this.frames[el.dataset.frame | 0]);
				}
			}

			document.addEventListener('DOMContentLoaded', () => {
				window.pathless = new Universe();
			});
		</script>
	</head>
	<body>
		<div id="universe" data-focused="0" data-layout="1" data-variant="0">
			<div id="zero" data-frame="0"></div>
			<div id="fx" data-frame="0"></div>
			<div id="one" data-frame="0"></div>
		</div>
	</body>
</html>
