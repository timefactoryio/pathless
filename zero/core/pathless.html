<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>hello.universe</title>
		<style>
			:root {
				--b: 1px solid blue;
			}
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
				user-select: none;
				-webkit-user-select: none;
				scrollbar-width: none;
			}
			body {
				height: 100dvh;
				overflow: hidden;
				font-family: sans-serif;
				background: #000;
				color: #fff;
				display: flex;
				border: var(--b);
				border-radius: 5px;
				text-decoration: none;
			}
			#universe {
				flex: 1;
				display: flex;
			}
			:is(#zero, #fx, #one) {
				flex: 1;
				overflow: hidden;
				container-type: size;
				position: relative;
				isolation: isolate;
				display: flex;
				flex-direction: column;
			}
			:is(#zero, #fx, #one) > * {
				width: 100%;
			}
			:is(#zero, #fx, #one) > :first-child {
				flex: 1;
				min-height: 0;
			}
			#zero {
				grid-area: zero;
				container-name: zero;
			}
			#fx {
				grid-area: fx;
				container-name: fx;
			}
			#one {
				grid-area: one;
				container-name: one;
			}
			#universe[data-layout='1'] #fx,
			#universe[data-layout='1'] #one,
			#universe[data-layout='2'] #one {
				display: none;
			}
			#universe[data-layout='2'][data-variant='0'] #zero,
			#universe[data-layout='3'][data-variant='0'] #zero {
				border-right: var(--b);
			}
			#universe[data-layout='2'][data-variant='1'] #zero,
			#universe[data-layout='3'][data-variant='1'] #zero {
				border-bottom: var(--b);
			}
			#universe[data-layout='3'][data-variant='2'] #zero {
				border-left: var(--b);
			}
			#universe[data-layout='3'][data-variant='3'] #zero {
				border-top: var(--b);
			}
			#universe[data-layout='2'][data-variant='1'] {
				flex-direction: column;
			}
			#universe[data-layout='3'] {
				display: grid;
				grid-template-columns: 1fr 1fr;
				grid-template-rows: 1fr 1fr;
			}
			#universe[data-layout='3'][data-variant='0'] {
				grid-template-areas: 'zero one' 'zero fx';
			}
			#universe[data-layout='3'][data-variant='1'] {
				grid-template-areas: 'zero zero' 'one  fx';
			}
			#universe[data-layout='3'][data-variant='2'] {
				grid-template-areas: 'one  zero' 'fx   zero';
			}
			#universe[data-layout='3'][data-variant='3'] {
				grid-template-areas: 'one  fx' 'zero zero';
			}
			#universe[data-layout='3'][data-variant='1'] #fx,
			#universe[data-layout='3'][data-variant='3'] #fx {
				border-left: var(--b);
			}
			#panel {
				height: 20%;
				flex-shrink: 0;
				border-top: var(--b);
				display: flex;
			}
			#panel[data-panel='1'] {
				align-items: center;
				justify-content: center;
			}
			#panel[data-panel='2'] #panel-left,
			#panel[data-panel='2'] #panel-right {
				flex: 1;
				display: flex;
				align-items: center;
				justify-content: center;
			}
			#panel[data-panel='2'] #panel-left {
				border-right: var(--b);
			}
			#panel[data-panel='1'] #panel-right {
				display: none;
			}
		</style>
		<script>
			class Universe {
				#td = new TextDecoder();
				async #parse(url) {
					const buf = await window
						.fetch(url)
						.then((r) => r.arrayBuffer());
					const bytes = new Uint8Array(buf);
					let pos = 4 + new DataView(buf).getUint32(0);
					return JSON.parse(
						this.#td.decode(bytes.subarray(4, pos)),
					).map((e) => ({
						...e,
						data: bytes.subarray(pos, (pos += e.size)),
					}));
				}

				constructor() {
					this.universe = document.getElementById('universe');
					this.space = ['zero', 'fx', 'one'].map((id) =>
						document.getElementById(id),
					);

					new MutationObserver(() => this.render()).observe(
						this.universe,
						{ attributeFilter: ['data-focused'] },
					);

					new MutationObserver(() =>
						this.space.forEach((_, i) => this.render(i)),
					).observe(this.universe, {
						attributeFilter: ['data-layout'],
					});

					new MutationObserver(() => {}).observe(this.universe, {
						attributeFilter: ['data-variant'],
					});

					this.space.forEach((el) =>
						new MutationObserver(() =>
							this.exec(el, this.frames[el.dataset.frame | 0]),
						).observe(el, { attributeFilter: ['data-frame'] }),
					);

					this.init();
				}

				async init() {
					const [input, layout, keyboard, ...frames] = (
						await this.#parse('{{.APIURL}}')
					).map((e) => this.#td.decode(e.data));
					this.input = input;
					this.layout = layout;
					this.frames = frames;
					this.render();
				}

				exec(el, html) {
					el.innerHTML = html;
					el.querySelectorAll('script').forEach((old) => {
						const s = document.createElement('script');
						s.textContent = old.textContent;
						old.replaceWith(s);
					});
				}

				render(i = +this.universe.dataset.focused) {
					const el = this.space[i];
					this.exec(el, this.frames[el.dataset.frame | 0]);
				}

				nav(dir) {
					const el = this.space[+this.universe.dataset.focused];
					el.dataset.frame =
						((el.dataset.frame | 0) + dir + this.frames.length) %
						this.frames.length;
				}
			}

			document.addEventListener('DOMContentLoaded', () => {
				window.pathless = new Universe();
			});
		</script>
	</head>
	<body>
		<div id="universe" data-focused="0" data-layout="1" data-variant="0">
			<div id="zero" data-frame="0"></div>
			<div id="fx" data-frame="0"></div>
			<div id="one" data-frame="0"></div>
		</div>
	</body>
</html>
