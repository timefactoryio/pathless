<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>hello.universe</title>
		<style>
			:root {
				--b: 1px solid blue;
			}
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
				user-select: none;
				-webkit-user-select: none;
				scrollbar-width: none;
			}
			body {
				height: 100dvh;
				overflow: hidden;
				font-family: sans-serif;
				background: #000;
				color: #fff;
				display: flex;
				border: var(--b);
				border-radius: 5px;
				text-decoration: none;
			}
			#universe {
				flex: 1;
				display: flex;
			}
			:is(#zero, #fx, #one) {
				flex: 1;
				overflow: hidden;
				container-type: size;
				position: relative;
				isolation: isolate;
				display: flex;
				flex-direction: column;
			}
			:is(#zero, #fx, #one) > * {
				width: 100%;
			}
			:is(#zero, #fx, #one) > :first-child {
				flex: 1;
				min-height: 0;
			}
			#zero {
				grid-area: zero;
				container-name: zero;
			}
			#fx {
				grid-area: fx;
				container-name: fx;
			}
			#one {
				grid-area: one;
				container-name: one;
			}
			#universe[data-layout='0'] #fx,
			#universe[data-layout='0'] #one,
			#universe[data-layout='1'] #one {
				display: none;
			}
			#universe[data-layout='1'][data-variant='0'] #zero,
			#universe[data-layout='2'][data-variant='0'] #zero {
				border-right: var(--b);
			}
			#universe[data-layout='1'][data-variant='1'] #zero,
			#universe[data-layout='2'][data-variant='1'] #zero {
				border-bottom: var(--b);
			}
			#universe[data-layout='2'][data-variant='2'] #zero {
				border-left: var(--b);
			}
			#universe[data-layout='2'][data-variant='3'] #zero {
				border-top: var(--b);
			}
			#universe[data-layout='1'][data-variant='1'] {
				flex-direction: column;
			}
			#universe[data-layout='2'] {
				display: grid;
				grid-template-columns: 1fr 1fr;
				grid-template-rows: 1fr 1fr;
			}
			#universe[data-layout='2'][data-variant='0'] {
				grid-template-areas: 'zero one' 'zero fx';
			}
			#universe[data-layout='2'][data-variant='1'] {
				grid-template-areas: 'zero zero' 'one  fx';
			}
			#universe[data-layout='2'][data-variant='2'] {
				grid-template-areas: 'one  zero' 'fx   zero';
			}
			#universe[data-layout='2'][data-variant='3'] {
				grid-template-areas: 'one  fx' 'zero zero';
			}
			#universe[data-layout='2'][data-variant='1'] #fx,
			#universe[data-layout='2'][data-variant='3'] #fx {
				border-left: var(--b);
			}
			#panel {
				height: 20%;
				flex-shrink: 0;
				border-top: var(--b);
				display: flex;
			}
			#panel[data-panel='1'] {
				align-items: center;
				justify-content: center;
			}
			#panel[data-panel='2'] #panel-left,
			#panel[data-panel='2'] #panel-right {
				flex: 1;
				display: flex;
				align-items: center;
				justify-content: center;
			}
			#panel[data-panel='2'] #panel-left {
				border-right: var(--b);
			}
			#panel[data-panel='1'] #panel-right {
				display: none;
			}
		</style>
		<script>
			class Universe {
				#td = new TextDecoder();
				constructor() {
					this.universe = document.getElementById('universe');
					this.spaces = ['zero', 'fx', 'one'].map((id) =>
						document.getElementById(id),
					);
					this.init();
				}

				async wire(url) {
					const buf = await window
						.fetch(url)
						.then((r) => r.arrayBuffer());
					const bytes = new Uint8Array(buf);
					let pos = 4 + new DataView(buf).getUint32(0);
					return JSON.parse(
						this.#td.decode(bytes.subarray(4, pos)),
					).map((e) => ({
						...e,
						data: bytes.subarray(pos, (pos += e.size)),
					}));
				}

				async init() {
					const [input, layout, keyboard, ...frames] = (
						await this.wire('{{.APIURL}}')
					).map((e) => this.#td.decode(e.data));
					this.universe.focused = 0;
					this.frames = frames;
					this.spaces.forEach((el) => {
						el.frame = 0;
						el.state = new Map(
							frames.map((_, i) => [i, new Map()]),
						);
					});
					this.input = new Function(input)();
					this.layouts = new Function(layout)();
					this.kb = new Function(keyboard)();
					this.render();
				}

				get space() {
					return this.spaces[this.universe.focused];
				}

				write(key, value) {
					const el = this.space;
					el.state.get(el.frame).set(key, value);
				}

				read() {
					const el = this.space;
					return Object.fromEntries(el.state.get(el.frame));
				}

				exec(el) {
					for (const old of el.querySelectorAll('script, style')) {
						const fresh = document.createElement(old.localName);
						for (const { name, value } of old.attributes)
							fresh.setAttribute(name, value);
						fresh.textContent = old.textContent;
						old.replaceWith(fresh);
					}
				}

				render(i = this.universe.focused) {
					const el = this.spaces[i];
					el.innerHTML = this.frames[el.frame];
					this.exec(el);
				}

				nav(dir) {
					const el = this.space;
					el.frame =
						(el.frame + dir + this.frames.length) %
						this.frames.length;
					el.innerHTML = this.frames[el.frame];
					this.exec(el);
				}
			}

			document.addEventListener('DOMContentLoaded', () => {
				window.pathless = new Universe();
			});
		</script>
	</head>
	<body>
		<div id="universe" data-layout="0" data-variant="0">
			<div id="zero"></div>
			<div id="fx"></div>
			<div id="one"></div>
		</div>
	</body>
</html>
