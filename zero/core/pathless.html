<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>hello.universe</title>
		<style>
			:root {
				--b: 1px solid blue;
			}
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
				user-select: none;
				-webkit-user-select: none;
				scrollbar-width: none;
			}
			body {
				height: 100dvh;
				overflow: hidden;
				font-family: sans-serif;
				background: #000;
				color: #fff;
				display: flex;
				border: var(--b);
				border-radius: 5px;
				text-decoration: none;
			}
			#universe {
				flex: 1;
				display: flex;
			}
			:is(#zero, #fx, #one) {
				flex: 1;
				overflow: hidden;
				container-type: size;
				position: relative;
				isolation: isolate;
				display: flex;
				flex-direction: column;
			}
			:is(#zero, #fx, #one) > * {
				width: 100%;
			}
			:is(#zero, #fx, #one) > :first-child {
				flex: 1;
				min-height: 0;
			}
			#zero {
				grid-area: zero;
				container-name: zero;
			}
			#fx {
				grid-area: fx;
				container-name: fx;
			}
			#one {
				grid-area: one;
				container-name: one;
			}
		</style>
		<script>
			class Universe {
				constructor() {
					this.universe = document.getElementById('universe');
					this.space = ['zero', 'fx', 'one'].map((id) =>
						document.getElementById(id),
					);

					fetch('{{.APIURL}}')
						.then((r) => r.arrayBuffer())
						.then((buf) => {
							const [input, layout, keyboard, ...frames] =
								this.decode(buf);
							this.input = input;
							this.layout = layout;
							this.keyboard = keyboard;
							this.frames = frames;
						});
				}

				decode(buf) {
					const view = new DataView(buf);
					const mlen = view.getUint32(0);
					const manifest = JSON.parse(
						new TextDecoder().decode(new Uint8Array(buf, 4, mlen)),
					);
					const bytes = new Uint8Array(buf);
					return manifest.map((e) => ({
						...e,
						data: bytes.subarray(e.offset, e.offset + e.size),
					}));
				}

				render(i = +this.universe.dataset.focused) {
					const el = this.space[i];
					el.innerHTML = new TextDecoder().decode(
						this.frames[el.dataset.frame | 0].data,
					);
				}
			}

			document.addEventListener('DOMContentLoaded', () => {
				window.pathless = new Universe();
			});
		</script>
	</head>
	<body>
		<div id="universe" data-focused="0" data-layout="1" data-variant="0">
			<div id="zero" data-frame="0"></div>
			<div id="fx" data-frame="0"></div>
			<div id="one" data-frame="0"></div>
		</div>
	</body>
</html>
