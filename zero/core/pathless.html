<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no" />
		<title>hello.universe</title>
		<style>
			:root {
				--b: 1px solid blue;
			}
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
				user-select: none;
				-webkit-user-select: none;
				scrollbar-width: none;
			}
			[hidden] {
				display: none !important;
			}
			body {
				height: 100dvh;
				overflow: hidden;
				font-family: sans-serif;
				background: #000;
				color: #fff;
				display: flex;
				border: var(--b);
				border-radius: 5px;
				touch-action: pan-y;
			}
			#universe {
				flex: 1;
				display: flex;
			}
			:is(#zero, #fx, #one) {
				flex: 1;
				overflow: hidden;
				container-type: size;
				position: relative;
				isolation: isolate;
				display: flex;
				flex-direction: column;
			}
			:is(#zero, #fx, #one) > * {
				width: 100%;
			}
			:is(#zero, #fx, #one) > :first-child {
				flex: 1;
				min-height: 0;
			}
			:is(#zero, #fx, #one):has(#panel:not([hidden])) > :first-child {
				flex: 0 0 80cqh;
			}
			#zero {
				grid-area: zero;
				container-name: zero;
			}
			#fx {
				grid-area: fx;
				container-name: fx;
			}
			#one {
				grid-area: one;
				container-name: one;
			}
			#universe[data-layout='1'][data-variant='1'] {
				flex-direction: column;
			}
			#universe[data-layout='2'] {
				display: grid;
				grid-template-columns: 1fr 1fr;
				grid-template-rows: 1fr 1fr;
			}
			#universe[data-layout='2'][data-variant='0'] {
				grid-template-areas: 'zero fx' 'zero one';
			}
			#universe[data-layout='2'][data-variant='1'] {
				grid-template-areas: 'zero zero' 'one  fx';
			}
			#universe[data-layout='2'][data-variant='2'] {
				grid-template-areas: 'one  zero' 'fx   zero';
			}
			#universe[data-layout='2'][data-variant='3'] {
				grid-template-areas: 'fx   one' 'zero zero';
			}
			#universe:not([data-layout='0'])[data-variant='0'] #zero {
				border-right: var(--b);
			}
			#universe:not([data-layout='0'])[data-variant='1'] #zero {
				border-bottom: var(--b);
			}
			#universe[data-layout='2'][data-variant='2'] #zero {
				border-left: var(--b);
			}
			#universe[data-layout='2'][data-variant='3'] #zero {
				border-top: var(--b);
			}
			#universe[data-layout='2'][data-variant='0'] #fx {
				border-bottom: var(--b);
			}
			#universe[data-layout='2'][data-variant='1'] #fx {
				border-left: var(--b);
			}
			#universe[data-layout='2'][data-variant='2'] #fx {
				border-top: var(--b);
			}
			#universe[data-layout='2'][data-variant='3'] #fx {
				border-right: var(--b);
			}
		</style>
		<script>
			window.apiUrl = '{{.APIURL}}';
			class Universe {
				#td = new TextDecoder();
				constructor() {
					this.universe = {
						el: document.getElementById('universe'),
						layout: 0,
						variant: 0,
						focused: 0,
						prev: null,
						frames: [],
						cache: new Map(),
					};
					for (const id of ['zero', 'fx', 'one']) {
						this[id] = this.universe[id] = {
							el: document.getElementById(id),
							frame: 0,
							state: new Map(),
						};
					}
					this.spaces = [this.zero, this.fx, this.one];
					this.panel = Object.assign(document.createElement('div'), {
						id: 'panel',
						hidden: true,
					});
					this.init();
				}

				wire(buf) {
					const bytes = new Uint8Array(buf);
					const count = (bytes[0] << 8) | bytes[1];
					const values = new Array(count);
					let pos = 2;
					const str = (n) =>
						n
							? this.#td.decode(bytes.subarray(pos, (pos += n)))
							: undefined;
					const u32 = () =>
						(bytes[pos++] << 24) |
						(bytes[pos++] << 16) |
						(bytes[pos++] << 8) |
						bytes[pos++];
					for (let i = 0; i < count; i++) {
						const name = str(bytes[pos++]);
						const type = str(bytes[pos++]);
						const n = u32();
						values[i] = {
							name,
							type,
							data: bytes.subarray(pos, (pos += n)),
						};
					}
					return values;
				}

				source(url) {
					const { cache } = this.universe;
					if (!cache.has(url))
						cache.set(
							url,
							fetch(url)
								.then((r) => r.arrayBuffer())
								.then((buf) => this.wire(buf)),
						);
					return cache.get(url);
				}

				async init() {
					const [input, kb, ...rest] = this.wire(
						await fetch(window.apiUrl).then((r) => r.arrayBuffer()),
					);
					const inputEl = document.createElement('div');
					inputEl.innerHTML = this.#td.decode(input.data);
					document.body.appendChild(inputEl);
					this.exec(inputEl);
					document.body.removeChild(inputEl);

					this.panel.innerHTML = this.#td.decode(kb.data);
					document.body.appendChild(this.panel);
					this.exec(this.panel);
					document.body.removeChild(this.panel);

					this.universe.frames = rest.map((e) => ({
						html: this.#td.decode(e.data),
					}));
					if (this.universe.frames.length) this.render();
				}

				set focused(v) {
					let i = v % 3;
					while (this.spaces[i].el.hidden) i = (i + 1) % 3;
					this.universe.focused = i;
					this.universe.el.dataset.focused = i;
					this.spaces.forEach((s, j) => {
						s.el.inert = !s.el.hidden && j !== i;
					});
				}
				set view([l, v]) {
					this.universe.prev = [
						this.universe.layout,
						this.universe.variant,
					];
					this.universe.layout = l;
					this.universe.variant = v;
					this.universe.el.dataset.layout = l;
					this.universe.el.dataset.variant = v;
				}

				get space() {
					return this.spaces[this.universe.focused];
				}

				get frame() {
					return this.universe.frames[this.space.frame];
				}

				read() {
					return this.space.state.get(this.space.frame) ?? new Map();
				}

				write(k, v) {
					const { frame, state } = this.space;
					if (!state.has(frame)) state.set(frame, new Map());
					state.get(frame).set(k, v);
				}

				sync() {
					const { layout, focused } = this.universe;
					this.spaces.forEach((s, i) => {
						s.el.hidden = layout === 0 ? i !== focused : i > layout;
					});
					this.focused = focused;
					this.spaces.forEach((s, i) => {
						if (!s.el.hidden) this.render(i);
					});
				}

				render(i = this.universe.focused) {
					const s = this.spaces[i];
					const f = this.universe.frames[s.frame];
					this.input?.clear(i);
					s.el.innerHTML = f.html;
					this.exec(s.el);
					if (!this.panel.hidden && i === this.universe.focused)
						this.keyboard.mount(s.el);
				}

				exec(el) {
					for (const old of el.querySelectorAll('script, style')) {
						const fresh = document.createElement(old.localName);
						for (const { name, value } of old.attributes)
							fresh.setAttribute(name, value);
						fresh.textContent = old.textContent;
						old.replaceWith(fresh);
					}
				}

				cycle(layout = this.universe.layout) {
					if (layout !== this.universe.layout) {
						this.view = [layout, 0];
					} else if (layout === 0) {
						if (!this.universe.prev) return;
						this.view = this.universe.prev;
					} else {
						this.view = [
							this.universe.layout,
							(this.universe.variant + 1) %
								[1, 2, 4][this.universe.layout],
						];
						return this.render();
					}
					this.sync();
				}

				focus(i = this.universe.focused + 1, rerender = true) {
					const prev = this.universe.focused;
					this.focused = i;
					if (rerender && this.universe.focused !== prev)
						this.render();
				}

				nav(dir) {
					this.space.frame =
						(this.space.frame + dir + this.universe.frames.length) %
						this.universe.frames.length;
					this.render();
				}

				toggle() {
					this.panel.hidden = !this.panel.hidden;
					if (!this.panel.hidden)
						this.keyboard.mount(
							this.spaces[this.universe.focused].el,
						);
				}
			}

			document.addEventListener('DOMContentLoaded', () => {
				window.pathless = new Universe();
			});
		</script>
	</head>
	<body>
		<div id="universe" data-layout="0" data-variant="0" data-focused="0">
			<div id="zero"></div>
			<div id="fx" hidden></div>
			<div id="one" hidden></div>
		</div>
	</body>
</html>
