<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1.0" />
		<title>hello.universe</title>
		<style>
			:root {
				--b: 1px solid blue;
			}
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
				user-select: none;
				-webkit-user-select: none;
				scrollbar-width: none;
			}
			[hidden] {
				display: none !important;
			}
			body {
				height: 100dvh;
				overflow: hidden;
				font-family: sans-serif;
				background: #000;
				color: #fff;
				display: flex;
				border: var(--b);
				border-radius: 5px;
			}
			#universe {
				flex: 1;
				display: flex;
			}
			:is(#zero, #fx, #one) {
				flex: 1;
				overflow: hidden;
				container-type: size;
				position: relative;
				isolation: isolate;
				display: flex;
				flex-direction: column;
			}
			:is(#zero, #fx, #one) > * {
				width: 100%;
			}
			:is(#zero, #fx, #one) > :first-child {
				flex: 1;
				min-height: 0;
			}
			:is(#zero, #fx, #one):has(#panel:not([hidden])) > :first-child {
				flex: 0 0 80cqh;
			}
			#zero {
				grid-area: zero;
				container-name: zero;
			}
			#fx {
				grid-area: fx;
				container-name: fx;
			}
			#one {
				grid-area: one;
				container-name: one;
			}
			#universe[data-layout='1'][data-variant='1'] {
				flex-direction: column;
			}
			#universe[data-layout='2'] {
				display: grid;
				grid-template-columns: 1fr 1fr;
				grid-template-rows: 1fr 1fr;
			}
			#universe[data-layout='2'][data-variant='0'] {
				grid-template-areas: 'zero fx' 'zero one';
			}
			#universe[data-layout='2'][data-variant='1'] {
				grid-template-areas: 'zero zero' 'one  fx';
			}
			#universe[data-layout='2'][data-variant='2'] {
				grid-template-areas: 'one  zero' 'fx   zero';
			}
			#universe[data-layout='2'][data-variant='3'] {
				grid-template-areas: 'fx   one' 'zero zero';
			}
			#universe:not([data-layout='0'])[data-variant='0'] #zero {
				border-right: var(--b);
			}
			#universe:not([data-layout='0'])[data-variant='1'] #zero {
				border-bottom: var(--b);
			}
			#universe[data-layout='2'][data-variant='2'] #zero {
				border-left: var(--b);
			}
			#universe[data-layout='2'][data-variant='3'] #zero {
				border-top: var(--b);
			}
			#universe[data-layout='2'][data-variant='0'] #fx {
				border-bottom: var(--b);
			}
			#universe[data-layout='2'][data-variant='1'] #fx {
				border-left: var(--b);
			}
			#universe[data-layout='2'][data-variant='2'] #fx {
				border-top: var(--b);
			}
			#universe[data-layout='2'][data-variant='3'] #fx {
				border-right: var(--b);
			}
		</style>
		<script>
			window.apiUrl = '{{.APIURL}}';
			const state = {
				layout: 0,
				variant: 0,
				focused: 0,
				prev: null,
				frames: [],
				spaces: [
					{ frameIndex: 0, frameState: [] },
					{ frameIndex: 0, frameState: [] },
					{ frameIndex: 0, frameState: [] },
				],
			};
			const cache = new Map();

			class Universe {
				#td = new TextDecoder();

				constructor() {
					this.universe = document.getElementById('universe');
					this.els = ['zero', 'fx', 'one'].map((id) =>
						document.getElementById(id),
					);
					this.panel = Object.assign(document.createElement('div'), {
						id: 'panel',
						hidden: true,
					});
					this.keys = [
						this.key('1', () => this.cycle(0)),
						this.key('2', () => this.cycle(1)),
						this.key('3', () => this.cycle(2)),
						this.key(
							'tab',
							(e) => (e.preventDefault(), this.focus()),
						),
						this.key('q', () => this.nav(-1), { desc: 'back' }),
						this.key('e', () => this.nav(1), { desc: 'next' }),
						this.key('z', () => this.toggle()),
					];
					this.init();
					window.addEventListener('keydown', this.handle);
					window.addEventListener('keyup', this.handle);
				}

				handle = (e) => {
					const key = e.key.toLowerCase();
					const o =
						this.keys.find((o) => o.key === key) ??
						this.frame?.binds?.find((o) => o.key === key);
					if (!o) return;
					o.state = e.type === 'keydown';
					this.keyboard?.reflect(o);
					(o.state ? o.down : o.up)?.(e);
				};

				wire(buf) {
					const bytes = new Uint8Array(buf);
					const view = new DataView(buf);
					let pos = 1;
					if (bytes[0] === 0x00) {
						pos += 4 + view.getUint32(1);
						return JSON.parse(
							this.#td.decode(bytes.subarray(5, pos)),
						).map((e) => ({
							...e,
							data: bytes.subarray(pos, (pos += e.size)),
						}));
					}
					const result = [];
					while (pos < bytes.length) {
						const size = view.getUint32(pos);
						result.push({
							data: bytes.subarray((pos += 4), (pos += size)),
						});
					}
					return result;
				}

				source(url) {
					if (!cache.has(url))
						cache.set(
							url,
							fetch(url)
								.then((r) => r.arrayBuffer())
								.then((buf) => this.wire(buf)),
						);
					return cache.get(url);
				}

				async init() {
					const [kb, ...rest] = this.wire(
						await fetch(window.apiUrl).then((r) => r.arrayBuffer()),
					);
					this.panel.innerHTML = this.#td.decode(kb.data);
					document.body.appendChild(this.panel);
					this.exec(this.panel);
					document.body.removeChild(this.panel);
					state.frames = rest.map((e) => ({
						html: this.#td.decode(e.data),
					}));
					for (const s of state.spaces)
						s.frameState = state.frames.map(() => ({}));
					if (state.frames.length) this.render();
				}

				set focused(v) {
					let i = v % 3;
					while (this.els[i].hidden) i = (i + 1) % 3;
					state.focused = i;
					this.universe.dataset.focused = i;
					this.els.forEach((el, j) => {
						el.inert = !el.hidden && j !== i;
					});
				}

				set view([l, v]) {
					state.prev = [state.layout, state.variant];
					state.layout = l;
					state.variant = v;
					this.universe.dataset.layout = l;
					this.universe.dataset.variant = v;
				}

				get space() {
					return state.spaces[state.focused];
				}

				get frame() {
					return state.frames[this.space.frameIndex];
				}

				get frameState() {
					return this.space.frameState[this.space.frameIndex];
				}

				read() {
					return { ...this.space.frameState[this.space.frameIndex] };
				}

				write(k, v) {
					this.space.frameState[this.space.frameIndex][k] = v;
				}

				key(k, down, { up = null, desc = '' } = {}) {
					return {
						key: k.toLowerCase(),
						down,
						up,
						desc,
						state: false,
					};
				}

				bind(k, down, opts) {
					(this.frame.binds ??= []).push(this.key(k, down, opts));
				}

				sync() {
					this.els.forEach((el, i) => {
						el.hidden =
							state.layout === 0
								? i !== state.focused
								: i > state.layout;
					});
					this.focused = state.focused;
					this.els.forEach((_, i) => {
						if (!this.els[i].hidden) this.render(i);
					});
				}

				render(i = state.focused) {
					const s = state.spaces[i];
					const f = state.frames[s.frameIndex];
					f.binds = [];
					this.els[i].innerHTML = f.html;
					this.exec(this.els[i]);
					if (!this.panel.hidden && i === state.focused)
						this.keyboard.mount(this.els[i]);
				}

				exec(el) {
					for (const old of el.querySelectorAll('script, style')) {
						const fresh = document.createElement(old.localName);
						for (const { name, value } of old.attributes)
							fresh.setAttribute(name, value);
						fresh.textContent = old.textContent;
						old.replaceWith(fresh);
					}
				}

				cycle(layout = state.layout) {
					if (layout !== state.layout) {
						this.view = [layout, 0];
					} else if (layout === 0) {
						if (!state.prev) return;
						this.view = state.prev;
					} else {
						this.view = [
							state.layout,
							(state.variant + 1) % [1, 2, 4][state.layout],
						];
						return this.render();
					}
					this.sync();
				}

				focus() {
					const prev = state.focused;
					this.focused = prev + 1;
					if (state.focused !== prev) this.render();
				}

				nav(dir) {
					this.space.frameIndex =
						(this.space.frameIndex + dir + state.frames.length) %
						state.frames.length;
					this.render();
				}

				toggle() {
					this.panel.hidden = !this.panel.hidden;
					if (!this.panel.hidden)
						this.keyboard.mount(this.els[state.focused]);
				}
			}

			document.addEventListener('DOMContentLoaded', () => {
				window.pathless = new Universe();
			});
		</script>
	</head>
	<body>
		<div id="universe" data-layout="0" data-variant="0" data-focused="0">
			<div id="zero"></div>
			<div id="fx" hidden></div>
			<div id="one" hidden></div>
		</div>
	</body>
</html>
