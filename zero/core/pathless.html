<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>hello.universe</title>
		<style>
			:root {
				--b: 1px solid blue;
			}
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
				user-select: none;
				-webkit-user-select: none;
				scrollbar-width: none;
			}
			[hidden] {
				display: none !important;
			}
			body {
				height: 100dvh;
				overflow: hidden;
				font-family: sans-serif;
				background: #000;
				color: #fff;
				display: flex;
				border: var(--b);
				border-radius: 5px;
			}
			#universe {
				flex: 1;
				display: flex;
			}
			:is(#zero, #fx, #one) {
				flex: 1;
				overflow: hidden;
				container-type: size;
				position: relative;
				isolation: isolate;
				display: flex;
				flex-direction: column;
			}
			:is(#zero, #fx, #one) > * {
				width: 100%;
			}
			:is(#zero, #fx, #one) > :first-child {
				flex: 1;
				min-height: 0;
			}
			#zero {
				grid-area: zero;
				container-name: zero;
			}
			#fx {
				grid-area: fx;
				container-name: fx;
			}
			#one {
				grid-area: one;
				container-name: one;
			}
			#universe[data-layout='1'][data-variant='1'] {
				flex-direction: column;
			}
			#universe[data-layout='2'] {
				display: grid;
				grid-template-columns: 1fr 1fr;
				grid-template-rows: 1fr 1fr;
			}
			#universe[data-layout='2'][data-variant='0'] {
				grid-template-areas: 'zero fx' 'zero one';
			}
			#universe[data-layout='2'][data-variant='1'] {
				grid-template-areas: 'zero zero' 'one  fx';
			}
			#universe[data-layout='2'][data-variant='2'] {
				grid-template-areas: 'one  zero' 'fx   zero';
			}
			#universe[data-layout='2'][data-variant='3'] {
				grid-template-areas: 'fx   one' 'zero zero';
			}
			#universe:not([data-layout='0'])[data-variant='0'] #zero {
				border-right: var(--b);
			}
			#universe:not([data-layout='0'])[data-variant='1'] #zero {
				border-bottom: var(--b);
			}
			#universe[data-layout='2'][data-variant='2'] #zero {
				border-left: var(--b);
			}
			#universe[data-layout='2'][data-variant='3'] #zero {
				border-top: var(--b);
			}
			#universe[data-layout='2'][data-variant='0'] #fx {
				border-bottom: var(--b);
			}
			#universe[data-layout='2'][data-variant='1'] #fx {
				border-left: var(--b);
			}
			#universe[data-layout='2'][data-variant='2'] #fx {
				border-top: var(--b);
			}
			#universe[data-layout='2'][data-variant='3'] #fx {
				border-right: var(--b);
			}
		</style>
		<script>
			class Universe {
				#td = new TextDecoder();
				#prev = null;
				constructor() {
					this.universe = document.getElementById('universe');
					this.spaces = ['zero', 'fx', 'one'].map((id) => ({
						el: document.getElementById(id),
						frameIndex: 0,
					}));
					this.frames = [];
					this.keys = [
						this.key('tab', (e) => {
							e.preventDefault();
							this.focus();
						}),
						this.key('1', () => this.cycle(0)),
						this.key('2', () => this.cycle(1)),
						this.key('3', () => this.cycle(2)),
						this.key('q', () => this.nav(-1)),
						this.key('e', () => this.nav(1)),
					];
					window.addEventListener('keydown', (e) => {
						const k = e.key.toLowerCase();
						this.keys.find((o) => o.key === k)?.down?.(e);
					});
					window.addEventListener('keyup', (e) => {
						const k = e.key.toLowerCase();
						this.keys.find((o) => o.key === k)?.up?.(e);
					});
					this.init();
				}

				wire(buf) {
					const bytes = new Uint8Array(buf);
					let pos = 4 + new DataView(buf).getUint32(0);
					return JSON.parse(
						this.#td.decode(bytes.subarray(4, pos)),
					).map((e) => ({
						...e,
						data: bytes.subarray(pos, (pos += e.size)),
					}));
				}

				async init() {
					try {
						const buf = await fetch('{{.APIURL}}').then((r) =>
							r.arrayBuffer(),
						);
						this.frames = this.wire(buf).map((e) => [
							this.#td.decode(e.data),
							[],
						]);
						for (const s of this.spaces)
							s.state = Array.from(
								{ length: this.frames.length },
								() => new Map(),
							);
					} catch (_) {}
					this.sync();
				}

				get focused() {
					return +this.universe.dataset.focused;
				}
				set focused(v) {
					this.universe.dataset.focused = v;
					this.spaces.forEach((s, i) => {
						s.el.inert = !s.el.hidden && i !== v;
					});
				}
				get layout() {
					return +this.universe.dataset.layout;
				}
				set layout(v) {
					this.universe.dataset.layout = v;
				}
				get variant() {
					return +this.universe.dataset.variant;
				}
				set variant(v) {
					this.universe.dataset.variant = v;
				}
				get space() {
					return this.spaces[this.focused];
				}

				read() {
					const s = this.space;
					return Object.fromEntries(s.state[s.frameIndex]);
				}
				write(k, v) {
					const s = this.space;
					s.state[s.frameIndex].set(k, v);
				}

				key(k, down, { up = null, el = null, desc = '' } = {}) {
					return { key: k.toLowerCase(), down, up, el, desc };
				}
				register(keys) {
					const f = this.frames[this.space.frameIndex];
					if (!f[1].length) f[1] = keys;
				}
				sync() {
					const l = this.layout;
					const wasHidden = this.spaces.map((s) => s.el.hidden);
					if (l !== 0) {
						this.spaces[0].el.hidden = false;
						this.spaces[1].el.hidden = l < 1;
						this.spaces[2].el.hidden = l < 2;
					}
					const f = this.focused;
					this.focused = this.spaces[f].el.hidden
						? this.spaces.findIndex((s) => !s.el.hidden)
						: f;
					const s = this.space;
					this.exec(s);
					this.spaces.forEach((sp, i) => {
						if (wasHidden[i] && !sp.el.hidden && sp !== s)
							this.exec(sp);
					});
					this.keys.length = 6;
					this.keys.push(...(this.frames[s.frameIndex]?.[1] ?? []));
				}

				exec(s) {
					const frame = this.frames[s.frameIndex];
					if (!frame) {
						s.el.replaceChildren();
						return;
					}
					s.el.innerHTML = frame[0];
					for (const old of s.el.querySelectorAll('script,style')) {
						const n = document.createElement(old.localName);
						for (const { name, value } of old.attributes)
							n.setAttribute(name, value);
						n.textContent = old.textContent;
						old.replaceWith(n);
					}
				}

				nav(dir) {
					const s = this.space;
					s.frameIndex =
						(s.frameIndex + dir + this.frames.length) %
						this.frames.length;
					this.sync();
				}
				focus() {
					if (this.spaces.every((s) => s.el.hidden)) return;
					let next = this.focused;
					do {
						next = (next + 1) % this.spaces.length;
					} while (this.spaces[next].el.hidden);
					this.focused = next;
					this.sync();
				}
				cycle(layout = this.layout) {
					if (layout !== this.layout) {
						this.#prev = [this.layout, this.variant];
						this.layout = layout;
						this.variant = 0;
						if (layout === 0) {
							const f = this.focused;
							this.spaces.forEach(
								(s, i) => (s.el.hidden = i !== f),
							);
						}
					} else if (layout === 0) {
						if (!this.#prev) return;
						[this.layout, this.variant] = this.#prev;
					} else {
						this.variant = (this.variant + 1) % [1, 2, 4][layout];
					}
					this.sync();
				}
			}

			document.addEventListener('DOMContentLoaded', () => {
				const u = (window.pathless = new Universe());
				window.read = () => u.read();
				window.write = (k, v) => u.write(k, v);
				window.space = () => u.space;
				window.frame = () => u.space.el.firstElementChild;
				window.key = (k, down, opts) => u.key(k, down, opts);
				window.register = (keys) => u.register(keys);
			});
		</script>
	</head>
	<body>
		<div id="universe" data-layout="0" data-variant="0" data-focused="0">
			<div id="zero"></div>
			<div id="fx" hidden></div>
			<div id="one" hidden></div>
		</div>
	</body>
</html>
