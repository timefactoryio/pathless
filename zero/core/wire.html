<script>
	class Wire {
		static #td = new TextDecoder();
		static parse(buf) {
			const bytes = new Uint8Array(buf);
			const view = new DataView(buf);
			let pos = 1;
			if (bytes[0] === 0x00) {
				const jsonLen = view.getUint32(1);
				const manifest = JSON.parse(
					Wire.#td.decode(bytes.subarray(5, 5 + jsonLen)),
				);
				pos = 5 + jsonLen;
				return manifest.map(
					(e) =>
						new Wire(
							e.name,
							e.type,
							bytes.subarray(pos, (pos += e.size)),
						),
				);
			}
			const result = [];
			while (pos < bytes.length) {
				const size = view.getUint32(pos);
				result.push(
					new Wire('', '', bytes.subarray((pos += 4), (pos += size))),
				);
			}
			return result;
		}
		constructor(name, type, data) {
			this.name = name;
			this.type = type;
			this.data = data;
		}
		text() {
			return Wire.#td.decode(this.data);
		}
		url() {
			return (this._url ??= URL.createObjectURL(
				new Blob([this.data], { type: this.type }),
			));
		}
		exec(target = document.createElement('div')) {
			target.innerHTML = this.text();
			const inDoc = document.contains(target);
			if (!inDoc) document.body.appendChild(target);
			for (const old of target.querySelectorAll('script, style')) {
				const fresh = document.createElement(old.localName);
				for (const { name, value } of old.attributes)
					fresh.setAttribute(name, value);
				fresh.textContent = old.textContent;
				old.replaceWith(fresh);
			}
			if (!inDoc) document.body.removeChild(target);
			return target;
		}
	}
</script>
