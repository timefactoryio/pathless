<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>hello.universe</title>
		<style>
			:root {
				--b: 1px solid blue;
			}
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
				user-select: none;
				-webkit-user-select: none;
				scrollbar-width: none;
			}
			body {
				height: 100dvh;
				overflow: hidden;
				font-family: sans-serif;
				background: #000;
				color: #fff;
				display: flex;
				border: var(--b);
				border-radius: 5px;
				text-decoration: none;
			}
			#universe {
				flex: 1;
				display: flex;
			}
			:is(#zero, #fx, #one) {
				flex: 1;
				overflow: hidden;
				container-type: size;
				position: relative;
				isolation: isolate;
				display: flex;
				flex-direction: column;
			}
			:is(#zero, #fx, #one) > * {
				width: 100%;
			}
			:is(#zero, #fx, #one) > :first-child {
				flex: 1;
				min-height: 0;
			}
			#zero {
				grid-area: zero;
				container-name: zero;
			}
			#fx {
				grid-area: fx;
				container-name: fx;
			}
			#one {
				grid-area: one;
				container-name: one;
			}
		</style>
		<script>
			class Universe {
				constructor() {
					this.universe = document.getElementById('universe');
					this.space = ['zero', 'fx', 'one'].map((id) =>
						document.getElementById(id),
					);

					fetch('{{.APIURL}}')
						.then((r) => r.arrayBuffer())
						.then((buf) => {
							const [input, layout, keyboard, ...frames] =
								this.decode(buf);
							this.input = input;
							this.layout = layout;
							this.keyboard = keyboard;
							this.frames = frames;
						});
				}

				// Bootstrap: positional strings
				// [count: 2B][off_0: 4B]...[data_0][data_1]...
				decode(buf) {
					const view = new DataView(buf);
					const n = view.getUint16(0);
					const off = Array.from({ length: n }, (_, i) =>
						view.getUint32(2 + i * 4),
					);
					const bytes = new Uint8Array(buf);
					const td = new TextDecoder();
					return off.map((o, i) =>
						td.decode(bytes.subarray(o, off[i + 1])),
					);
				}

				// Content: fixed schema with metadata
				// [count: 2B][Name:64B Type:64B Size:8B Offset:8B per entry]...[data_0][data_1]...
				decodeValues(buf) {
					const view = new DataView(buf);
					const bytes = new Uint8Array(buf);
					const td = new TextDecoder();
					const n = view.getUint16(0);
					return Array.from({ length: n }, (_, i) => {
						const h = 2 + i * 144;
						const name = td
							.decode(bytes.subarray(h, h + 64))
							.replace(/\0+$/, '');
						const type = td
							.decode(bytes.subarray(h + 64, h + 128))
							.replace(/\0+$/, '');
						const size = Number(view.getBigUint64(h + 128));
						const offset = Number(view.getBigUint64(h + 136));
						return {
							name,
							type,
							data: bytes.subarray(offset, offset + size),
						};
					});
				}
				render(i = +this.universe.dataset.focused) {
					const el = this.space[i];
					el.innerHTML = this.frames[el.dataset.frame | 0];
				}
			}

			document.addEventListener('DOMContentLoaded', () => {
				window.pathless = new Universe();
			});
		</script>
	</head>
	<body>
		<div id="universe" data-focused="0" data-layout="1" data-variant="0">
			<div id="zero" data-frame="0"></div>
			<div id="fx" data-frame="0"></div>
			<div id="one" data-frame="0"></div>
		</div>
	</body>
</html>
