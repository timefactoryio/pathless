<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no" />
		<title>hello.universe</title>
		<style>
			:root {
				--b: 1px solid blue;
			}
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
				user-select: none;
				-webkit-user-select: none;
			}
			[hidden] {
				display: none !important;
			}
			body {
				height: 100dvh;
				overflow: hidden;
				font-family: sans-serif;
				background: #000;
				color: #fff;
				display: flex;
				flex-direction: column;
				border: var(--b);
				border-radius: 5px;
				touch-action: none;
			}
			#universe {
				flex: 1;
				min-height: 0;
				display: flex;
			}
			:is(#zero, #fx, #one) {
				flex: 1;
				overflow: hidden;
				container-type: size;
				position: relative;
				isolation: isolate;
				display: flex;
				flex-direction: column;
				touch-action: none;
				overscroll-behavior: none;
			}
			:is(#zero, #fx, #one) > * {
				width: 100%;
			}
			:is(#zero, #fx, #one) > :first-child {
				flex: 1;
				min-height: 0;
			}
			#zero {
				grid-area: zero;
				container-name: zero;
			}
			#fx {
				grid-area: fx;
				container-name: fx;
			}
			#one {
				grid-area: one;
				container-name: one;
			}
			#universe[data-layout='1'][data-variant='1'] {
				flex-direction: column;
			}
			#universe[data-layout='2'] {
				display: grid;
				grid-template-columns: 1fr 1fr;
				grid-template-rows: 1fr 1fr;
			}
			#universe[data-layout='2'][data-variant='0'] {
				grid-template-areas: 'zero fx' 'zero one';
			}
			#universe[data-layout='2'][data-variant='1'] {
				grid-template-areas: 'zero zero' 'one  fx';
			}
			#universe[data-layout='2'][data-variant='2'] {
				grid-template-areas: 'one  zero' 'fx   zero';
			}
			#universe[data-layout='2'][data-variant='3'] {
				grid-template-areas: 'fx   one' 'zero zero';
			}
			#universe:not([data-layout='0'])[data-variant='0'] #zero {
				border-right: var(--b);
			}
			#universe:not([data-layout='0'])[data-variant='1'] #zero {
				border-bottom: var(--b);
			}
			#universe[data-layout='2'][data-variant='2'] #zero {
				border-left: var(--b);
			}
			#universe[data-layout='2'][data-variant='3'] #zero {
				border-top: var(--b);
			}
			#universe[data-layout='2'][data-variant='0'] #fx {
				border-bottom: var(--b);
			}
			#universe[data-layout='2'][data-variant='1'] #fx {
				border-left: var(--b);
			}
			#universe[data-layout='2'][data-variant='2'] #fx {
				border-top: var(--b);
			}
			#universe[data-layout='2'][data-variant='3'] #fx {
				border-right: var(--b);
			}
			#panel {
				height: 15vh;
				border-top: var(--b);
				touch-action: none;
				overscroll-behavior: none;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 0.5em;
			}
		</style>
		<script>
			window.circuit = '{{.CIRCUIT}}'.replace(
				'localhost',
				location.hostname,
			);
			class Pathless {
				#td = new TextDecoder();
				#range = document.createRange();
				constructor() {
					this.cache = new Map();
					this.init();
				}
				decode(bytes) {
					const view = new DataView(
						bytes.buffer,
						bytes.byteOffset,
						bytes.byteLength,
					);
					const frames = [];
					let pos = 0;
					while (pos < bytes.length) {
						const tl = bytes[pos++];
						const type = this.#td.decode(
							bytes.subarray(pos, (pos += tl)),
						);
						const n = view.getUint32(pos);
						pos += 4;
						frames.push({
							type,
							data: bytes.subarray(pos, (pos += n)),
						});
					}
					return frames;
				}
				source(path = '') {
					let p = this.cache.get(path);
					if (!p) {
						p = fetch(`${window.circuit}/${path}`)
							.then((r) => r.bytes())
							.then((bytes) =>
								this.decode(bytes).map((e) => {
									let u;
									return Object.defineProperty(e, 'url', {
										get: () =>
											(u ??= URL.createObjectURL(
												new Blob([e.data], e),
											)),
									});
								}),
							);
						this.cache.set(path, p);
					}
					return p;
				}
				exec(el, data) {
					el.replaceChildren(
						this.#range.createContextualFragment(
							this.#td.decode(data),
						),
					);
				}
				async init() {
					const [universe, frames, panels] = await this.source();
					this.exec(
						document.getElementById('universe'),
						universe.data,
					);
					this.universe.init(
						this.decode(frames.data).map((f) => f.data),
					);
					if (panels) {
						this.universe.panel.init(
							this.decode(panels.data).map((f) => f.data),
						);
					}
				}
			}
			document.addEventListener('DOMContentLoaded', () => {
				window.pathless = new Pathless();
			});
		</script>
	</head>
	<body>
		<div id="universe" data-layout="0" data-variant="0"></div>
		<div id="panel" hidden></div>
	</body>
</html>
