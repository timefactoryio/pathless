<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no" />
		<title>hello.universe</title>
		<style>
			:root {
				--b: 1px solid blue;
			}
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
				user-select: none;
				-webkit-user-select: none;
			}
			[hidden] {
				display: none !important;
			}
			body {
				height: 100dvh;
				overflow: hidden;
				font-family: sans-serif;
				background: #000;
				color: #fff;
				display: flex;
				flex-direction: column;
				border: var(--b);
				border-radius: 5px;
				touch-action: none;
			}
			#universe {
				flex: 1;
				min-height: 0;
				display: flex;
			}
			:is(#zero, #fx, #one) {
				flex: 1;
				overflow: hidden;
				container-type: size;
				position: relative;
				isolation: isolate;
				display: flex;
				flex-direction: column;
				touch-action: none;
				overscroll-behavior: none;
			}
			:is(#zero, #fx, #one) > * {
				width: 100%;
			}
			:is(#zero, #fx, #one) > :first-child {
				flex: 1;
				min-height: 0;
			}
			#zero {
				grid-area: zero;
				container-name: zero;
			}
			#fx {
				grid-area: fx;
				container-name: fx;
			}
			#one {
				grid-area: one;
				container-name: one;
			}
			#universe[data-layout='1'][data-variant='1'] {
				flex-direction: column;
			}
			#universe[data-layout='2'] {
				display: grid;
				grid-template-columns: 1fr 1fr;
				grid-template-rows: 1fr 1fr;
			}
			#universe[data-layout='2'][data-variant='0'] {
				grid-template-areas: 'zero fx' 'zero one';
			}
			#universe[data-layout='2'][data-variant='1'] {
				grid-template-areas: 'zero zero' 'one  fx';
			}
			#universe[data-layout='2'][data-variant='2'] {
				grid-template-areas: 'one  zero' 'fx   zero';
			}
			#universe[data-layout='2'][data-variant='3'] {
				grid-template-areas: 'fx   one' 'zero zero';
			}
			#universe:not([data-layout='0'])[data-variant='0'] #zero {
				border-right: var(--b);
			}
			#universe:not([data-layout='0'])[data-variant='1'] #zero {
				border-bottom: var(--b);
			}
			#universe[data-layout='2'][data-variant='2'] #zero {
				border-left: var(--b);
			}
			#universe[data-layout='2'][data-variant='3'] #zero {
				border-top: var(--b);
			}
			#universe[data-layout='2'][data-variant='0'] #fx {
				border-bottom: var(--b);
			}
			#universe[data-layout='2'][data-variant='1'] #fx {
				border-left: var(--b);
			}
			#universe[data-layout='2'][data-variant='2'] #fx {
				border-top: var(--b);
			}
			#universe[data-layout='2'][data-variant='3'] #fx {
				border-right: var(--b);
			}
			#panel {
				height: 15vh;
				border-top: var(--b);
				touch-action: none;
				overscroll-behavior: none;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 0.5em;
			}
		</style>
		<script>
			window.circuit = '{{.CIRCUIT}}'.replace(
				'localhost',
				location.hostname,
			);
			class Pathless {
				#td = new TextDecoder();
				static #spaces = ['zero', 'fx', 'one'];
				static #layouts = [null, [0, 1], [0, 1, 2]];
				static #variants = [1, 2, 4];
				constructor() {
					this.universe = {
						el: document.getElementById('universe'),
						space: Pathless.#spaces.map((id) => ({
							el: document.getElementById(id),
							frame: null,
						})),
						panel: document.getElementById('panel'),
						cache: new Map(),
						prev: null,
						focused: 0,
						frames: [],
						visible: [0],
					};
					this.input = null;
					this.init();
				}

				get visible() {
					return this.universe.visible;
				}
				get panel() {
					return this.universe.panel;
				}
				get focused() {
					return this.universe.focused;
				}
				get space() {
					return this.universe.space[this.focused];
				}

				wire(buf) {
					const bytes = new Uint8Array(buf);
					const count = (bytes[0] << 8) | bytes[1];
					const values = new Array(count);
					let pos = 2;
					const str = (n) =>
						n
							? this.#td.decode(bytes.subarray(pos, (pos += n)))
							: undefined;
					const u32 = () =>
						(bytes[pos++] << 24) |
						(bytes[pos++] << 16) |
						(bytes[pos++] << 8) |
						bytes[pos++];
					for (let i = 0; i < count; i++) {
						const name = str(bytes[pos++]);
						const type = str(bytes[pos++]);
						const n = u32();
						values[i] = {
							name,
							type,
							data: bytes.subarray(pos, (pos += n)),
						};
					}
					return values;
				}
				source(url) {
					const { cache } = this.universe;
					if (!cache.has(url))
						cache.set(
							url,
							fetch(url)
								.then((r) => r.arrayBuffer())
								.then((buf) => this.wire(buf)),
						);
					return cache.get(url);
				}
				async init() {
					const [input, panel, ...frames] = this.wire(
						await (await fetch(window.circuit)).arrayBuffer(),
					);
					this.#inject(this.universe.panel, input.data);
					this.#inject(this.universe.panel, panel.data);
					this.universe.frames = frames.map((e) => ({
						el: this.#td.decode(e.data),
						state: new Map(
							Pathless.#spaces.map((k) => [k, new Map()]),
						),
					}));
					if (this.universe.frames.length) {
						this.universe.space.forEach(
							(s) => (s.frame = this.universe.frames[0]),
						);
						this.sync();
					}
				}
				#inject(el, data) {
					el.innerHTML = this.#td.decode(data);
					this.exec(el);
				}
				read(i = this.focused) {
					const s = this.universe.space[i];
					return s.frame.state.get(s.el.id);
				}
				write(k, v, i = this.focused) {
					const s = this.universe.space[i];
					s.frame.state.get(s.el.id).set(k, v);
				}
				sync(...indices) {
					const prev = this.universe.focused;
					(indices.length ? indices : this.visible).forEach((i) => {
						const s = this.universe.space[i];
						s.el.innerHTML = s.frame.el;
						this.universe.focused = i;
						this.exec(s.el);
					});
					this.universe.focused = prev;
				}
				exec(el) {
					el.replaceChildren(
						document
							.createRange()
							.createContextualFragment(el.innerHTML),
					);
				}
				layout(l, v = 0) {
					if (l > 0) this.universe.prev = [l, v];
					this.universe.el.dataset.layout = l;
					this.universe.el.dataset.variant = v;
					const visible = new Set(
						l === 0
							? [this.universe.focused]
							: Pathless.#layouts[l],
					);
					this.universe.space.forEach(
						(s, i) => (s.el.hidden = !visible.has(i)),
					);
					this.universe.visible = [...visible].sort((a, b) => a - b);
					this.sync();
				}
				cycle(l = +this.universe.el.dataset.layout) {
					const cur = +this.universe.el.dataset.layout;
					if (cur === 0 && this.universe.prev)
						return this.layout(...this.universe.prev);
					const v =
						l === cur
							? (+this.universe.el.dataset.variant + 1) %
								Pathless.#variants[l]
							: 0;
					this.layout(l, v);
				}
				nav(dir, i = this.focused) {
					const s = this.universe.space[i];
					const f = this.universe.frames;
					s.frame =
						f[(f.indexOf(s.frame) + dir + f.length) % f.length];
					this.sync(i);
				}
				focus() {
					const v = this.visible;
					this.universe.focused =
						v[(v.indexOf(this.focused) + 1) % v.length];
				}
				toggle() {
					this.universe.panel.hidden = !this.universe.panel.hidden;
				}
			}

			document.addEventListener('DOMContentLoaded', () => {
				window.pathless = new Pathless();
			});
		</script>
	</head>
	<body>
		<div id="universe" data-layout="0" data-variant="0">
			<div id="zero"></div>
			<div id="fx" hidden></div>
			<div id="one" hidden></div>
		</div>
		<div id="panel" hidden></div>
	</body>
</html>
