<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no" />
		<title>hello.universe</title>
		<style>
			:root {
				--b: 1px solid blue;
			}
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
				user-select: none;
				-webkit-user-select: none;
			}
			[hidden] {
				display: none !important;
			}
			body {
				height: 100dvh;
				overflow: hidden;
				font-family: sans-serif;
				background: #000;
				color: #fff;
				display: flex;
				flex-direction: column;
				border: var(--b);
				border-radius: 5px;
				touch-action: none;
			}
			#universe {
				flex: 1;
				min-height: 0;
				display: flex;
			}
			:is(#zero, #fx, #one) {
				flex: 1;
				overflow: hidden;
				container-type: size;
				position: relative;
				isolation: isolate;
				display: flex;
				flex-direction: column;
				touch-action: none;
				overscroll-behavior: none;
			}
			:is(#zero, #fx, #one) > * {
				width: 100%;
			}
			:is(#zero, #fx, #one) > :first-child {
				flex: 1;
				min-height: 0;
			}
			#zero {
				grid-area: zero;
				container-name: zero;
			}
			#fx {
				grid-area: fx;
				container-name: fx;
			}
			#one {
				grid-area: one;
				container-name: one;
			}
			#universe[data-layout='1'][data-variant='1'] {
				flex-direction: column;
			}
			#universe[data-layout='2'] {
				display: grid;
				grid-template-columns: 1fr 1fr;
				grid-template-rows: 1fr 1fr;
			}
			#universe[data-layout='2'][data-variant='0'] {
				grid-template-areas: 'zero fx' 'zero one';
			}
			#universe[data-layout='2'][data-variant='1'] {
				grid-template-areas: 'zero zero' 'one  fx';
			}
			#universe[data-layout='2'][data-variant='2'] {
				grid-template-areas: 'one  zero' 'fx   zero';
			}
			#universe[data-layout='2'][data-variant='3'] {
				grid-template-areas: 'fx   one' 'zero zero';
			}
			#universe:not([data-layout='0'])[data-variant='0'] #zero {
				border-right: var(--b);
			}
			#universe:not([data-layout='0'])[data-variant='1'] #zero {
				border-bottom: var(--b);
			}
			#universe[data-layout='2'][data-variant='2'] #zero {
				border-left: var(--b);
			}
			#universe[data-layout='2'][data-variant='3'] #zero {
				border-top: var(--b);
			}
			#universe[data-layout='2'][data-variant='0'] #fx {
				border-bottom: var(--b);
			}
			#universe[data-layout='2'][data-variant='1'] #fx {
				border-left: var(--b);
			}
			#universe[data-layout='2'][data-variant='2'] #fx {
				border-top: var(--b);
			}
			#universe[data-layout='2'][data-variant='3'] #fx {
				border-right: var(--b);
			}
			#panel {
				height: 15vh;
				border-top: var(--b);
				touch-action: none;
				overscroll-behavior: none;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 0.5em;
			}
		</style>
		<script>
			window.circuit = '{{.CIRCUIT}}'.replace(
				'localhost',
				location.hostname,
			);
			class Pathless {
				static #Value = class {
					#url;
					constructor(type, data) {
						this.type = type;
						this.data = data;
					}
					get url() {
						return (this.#url ??= URL.createObjectURL(
							new Blob([this.data], { type: this.type }),
						));
					}
				};
				#td = new TextDecoder();
				#range = document.createRange();
				constructor() {
					this.cache = new Map();
					this.init();
				}
				decode(bytes) {
					const view = new DataView(
						bytes.buffer,
						bytes.byteOffset,
						bytes.byteLength,
					);
					let pos = 0;
					const types = [];
					for (let i = bytes[pos++]; i > 0; i--) {
						const tl = bytes[pos];
						pos += 1;
						types.push(
							this.#td.decode(bytes.subarray(pos, pos + tl)),
						);
						pos += tl;
					}
					const v = [];
					while (pos < bytes.length) {
						const type = types[bytes[pos]];
						pos += 1;
						const n = view.getUint32(pos);
						pos += 4;
						v.push(
							new Pathless.#Value(
								type,
								bytes.subarray(pos, pos + n),
							),
						);
						pos += n;
					}
					return v;
				}
				source(path = '') {
					let p = this.cache.get(path);
					if (!p) {
						p = fetch(`${window.circuit}/${path}`)
							.then(async (r) => this.decode(await r.bytes()))
							.catch((err) => {
								this.cache.delete(path);
								throw err;
							});
						this.cache.set(path, p);
					}
					return p;
				}
				exec(el, data) {
					el.replaceChildren(
						this.#range.createContextualFragment(
							this.#td.decode(data),
						),
					);
				}
				async init() {
					const [header, universe, ...rest] = await this.source();
					const frames = rest.slice(0, header.data[0]);
					const panels = rest.slice(header.data[0]);
					this.exec(
						document.getElementById('universe'),
						universe.data,
					);
					this.universe.frames = frames.map((f) => f.data);
					this.universe.panels = panels.map((f) => f.data);
					this.universe.init();
				}
			}
			document.addEventListener('DOMContentLoaded', () => {
				window.pathless = new Pathless();
			});
		</script>
	</head>
	<body>
		<div id="universe" data-layout="0" data-variant="0"></div>
		<div id="panel" hidden></div>
	</body>
</html>
