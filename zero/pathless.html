<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no" />
		<title>hello.universe</title>
		<style>
			:root {
				--b: 1px solid blue;
			}
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
				user-select: none;
				-webkit-user-select: none;
			}
			[hidden] {
				display: none !important;
			}
			body {
				height: 100dvh;
				overflow: hidden;
				font-family: sans-serif;
				background: #000;
				color: #fff;
				display: flex;
				flex-direction: column;
				border: var(--b);
				border-radius: 5px;
				touch-action: none;
			}
			#universe {
				flex: 1;
				min-height: 0;
				display: flex;
			}
			:is(#zero, #fx, #one) {
				flex: 1;
				overflow: hidden;
				container-type: size;
				position: relative;
				isolation: isolate;
				display: flex;
				flex-direction: column;
				touch-action: none;
				overscroll-behavior: none;
			}
			:is(#zero, #fx, #one) > * {
				width: 100%;
			}
			:is(#zero, #fx, #one) > :first-child {
				flex: 1;
				min-height: 0;
			}
			#zero {
				grid-area: zero;
				container-name: zero;
			}
			#fx {
				grid-area: fx;
				container-name: fx;
			}
			#one {
				grid-area: one;
				container-name: one;
			}
			#universe[data-layout='1'][data-variant='1'] {
				flex-direction: column;
			}
			#universe[data-layout='2'] {
				display: grid;
				grid-template-columns: 1fr 1fr;
				grid-template-rows: 1fr 1fr;
			}
			#universe[data-layout='2'][data-variant='0'] {
				grid-template-areas: 'zero fx' 'zero one';
			}
			#universe[data-layout='2'][data-variant='1'] {
				grid-template-areas: 'zero zero' 'one  fx';
			}
			#universe[data-layout='2'][data-variant='2'] {
				grid-template-areas: 'one  zero' 'fx   zero';
			}
			#universe[data-layout='2'][data-variant='3'] {
				grid-template-areas: 'fx   one' 'zero zero';
			}
			#universe:not([data-layout='0'])[data-variant='0'] #zero {
				border-right: var(--b);
			}
			#universe:not([data-layout='0'])[data-variant='1'] #zero {
				border-bottom: var(--b);
			}
			#universe[data-layout='2'][data-variant='2'] #zero {
				border-left: var(--b);
			}
			#universe[data-layout='2'][data-variant='3'] #zero {
				border-top: var(--b);
			}
			#universe[data-layout='2'][data-variant='0'] #fx {
				border-bottom: var(--b);
			}
			#universe[data-layout='2'][data-variant='1'] #fx {
				border-left: var(--b);
			}
			#universe[data-layout='2'][data-variant='2'] #fx {
				border-top: var(--b);
			}
			#universe[data-layout='2'][data-variant='3'] #fx {
				border-right: var(--b);
			}
			#panel {
				height: 15vh;
				border-top: var(--b);
				touch-action: none;
				overscroll-behavior: none;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 0.5em;
			}
		</style>
		<script>
			let lastTouch = 0;
			for (const t of ['touchstart', 'touchend'])
				document.addEventListener(
					t,
					(e) => {
						const now = Date.now();
						if (now - lastTouch < 300) e.preventDefault();
						lastTouch = now;
					},
					{ passive: false },
				);
			window.circuit = '{{.CIRCUIT}}'.replace(
				'localhost',
				location.hostname,
			);
			class Pathless {
				#td = new TextDecoder();
				#range = document.createRange();
				static #spaces = ['zero', 'fx', 'one'];
				static #layouts = [null, [0, 1], [0, 1, 2]];
				static #variants = [1, 2, 4];
				constructor() {
					this.universe = {
						el: document.getElementById('universe'),
						space: Pathless.#spaces.map((id) => ({
							el: document.getElementById(id),
							frame: null,
						})),
						panel: document.getElementById('panel'),
						cache: new Map(),
						prev: null,
						focused: 0,
						frames: [],
						visible: [0],
					};
					this.input = null;
					this.init();
				}

				get visible() {
					return this.universe.visible;
				}
				get panel() {
					return this.universe.panel;
				}
				get focused() {
					return this.universe.focused;
				}
				get space() {
					return this.universe.space[this.focused];
				}

				wire(buf, fn) {
					const bytes = new Uint8Array(buf);
					const count = (bytes[0] << 8) | bytes[1];
					let pos = 2;
					const values = new Array(count);
					for (let i = 0; i < count; i++) {
						const nl = bytes[pos++];
						const name = this.#td.decode(
							bytes.subarray(pos, (pos += nl)),
						);
						const tl = bytes[pos++];
						const type = this.#td.decode(
							bytes.subarray(pos, (pos += tl)),
						);
						const n =
							((bytes[pos] << 24) |
								(bytes[pos + 1] << 16) |
								(bytes[pos + 2] << 8) |
								bytes[pos + 3]) >>>
							0;
						pos += 4;
						values[i] = fn(
							name,
							type,
							bytes.subarray(pos, (pos += n)),
						);
					}
					return values;
				}
				source(path) {
					const { cache } = this.universe;
					if (!cache.has(path))
						cache.set(
							path,
							fetch(`${window.circuit}/${path}`).then(async (r) =>
								this.wire(
									await r.arrayBuffer(),
									(name, type, data) => ({
										name,
										url: URL.createObjectURL(
											new Blob([data], { type }),
										),
									}),
								),
							),
						);
					return cache.get(path);
				}
				async init() {
					const u = this.universe;
					const [coordinates, input, keyboard, ...frames] = this.wire(
						await (await fetch(window.circuit)).arrayBuffer(),
						(name, type, data) => data,
					);
					this.exec(u.panel, coordinates);
					this.#measure();
					this.exec(u.panel, input);
					this.exec(u.panel, keyboard);
					u.frames = frames.map((data) => ({
						el: data,
						state: new Map(
							Pathless.#spaces.map((k) => [k, new Map()]),
						),
					}));
					if (u.frames.length) {
						u.space.forEach((s) => (s.frame = u.frames[0]));
						this.sync();
					}
				}
				#measure() {
					const u = this.universe;
					(u.co ??= new pathless.Coordinates()).measure(u.el);
					const l = +u.el.dataset.layout,
						v = +u.el.dataset.variant;
					u.space.forEach((s, i) => (s.quads = u.co.quads(l, v, i)));
				}

				read(i = this.focused) {
					const s = this.universe.space[i];
					return s.frame.state.get(s.el.id);
				}
				write(k, v, i = this.focused) {
					const s = this.universe.space[i];
					s.frame.state.get(s.el.id).set(k, v);
				}
				sync(...indices) {
					const u = this.universe;
					const prev = u.focused;
					(indices.length ? indices : u.visible).forEach((i) => {
						const s = u.space[i];
						u.focused = i;
						this.exec(s.el, s.frame.el);
					});
					u.focused = prev;
				}
				exec(el, data) {
					el.replaceChildren(
						this.#range.createContextualFragment(
							this.#td.decode(data),
						),
					);
				}
				layout(l, v = 0) {
					const u = this.universe;
					if (l > 0) u.prev = [l, v];
					u.el.dataset.layout = l;
					u.el.dataset.variant = v;
					const visible = (u.visible =
						l === 0 ? [u.focused] : Pathless.#layouts[l]);
					u.space.forEach((s, i) => {
						s.el.hidden = !visible.includes(i);
						s.quads = u.co.quads(l, v, i);
					});
					this.sync();
				}
				cycle(l) {
					const { el, prev } = this.universe;
					const cur = +el.dataset.layout;
					if (cur === 0 && prev) return this.layout(...prev);
					l ??= cur;
					this.layout(
						l,
						cur === l
							? (+el.dataset.variant + 1) % Pathless.#variants[l]
							: 0,
					);
				}
				nav(dir, i = this.focused) {
					const { space, frames: f } = this.universe;
					const s = space[i];
					s.frame =
						f[(f.indexOf(s.frame) + dir + f.length) % f.length];
					this.sync(i);
				}
				focus() {
					const { visible: v, focused } = this.universe;
					this.universe.focused =
						v[(v.indexOf(focused) + 1) % v.length];
				}
				toggle() {
					this.universe.panel.hidden = !this.universe.panel.hidden;
				}
			}

			document.addEventListener('DOMContentLoaded', () => {
				window.pathless = new Pathless();
			});
		</script>
	</head>
	<body>
		<div id="universe" data-layout="0" data-variant="0">
			<div id="zero"></div>
			<div id="fx" hidden></div>
			<div id="one" hidden></div>
		</div>
		<div id="panel" hidden></div>
	</body>
</html>
