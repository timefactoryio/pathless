<style>
	.panel {
		height: 15vh;
		border-top: var(--b);
		touch-action: none;
		overscroll-behavior: none;
		display: flex;
		align-items: center;
		justify-content: center;
		padding: 0.5em;
	}
</style>

<script>
	{
		class Panel {
			constructor(pathless) {
				this.pathless = pathless;
				this.el = document.body.appendChild(
					document.createElement('div'),
				);
				this.el.id = 'panel';
				this.el.hidden = true;
				this.frames = [];
				this.frame = 0;
			}

			async init() {
				try {
					const frames = await this.pathless.source('panel');
					this.frames = frames.map((f) => f.data);
					this.fill();
				} catch {}
			}

			toggle() {
				this.el.hidden = !this.el.hidden;
			}

			fill(i = this.frame) {
				if (!this.frames.length) return;
				this.frame =
					((i % this.frames.length) + this.frames.length) %
					this.frames.length;
				this.pathless.exec(this.el, this.frames[this.frame]);
			}

			nav(dir) {
				this.fill(this.frame + dir);
			}
		}
		pathless.panel = new Panel(pathless);
		pathless.panel.init();
	}
</script>
