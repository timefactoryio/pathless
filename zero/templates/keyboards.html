<style>
	.keyboard {
		display: flex;
		align-items: center;
		justify-content: center;
		width: 100%;
		height: 100%;
	}
	.scale {
		display: grid;
		grid-template-columns: repeat(3, 1fr);
		grid-template-rows: repeat(4, 1fr);
		gap: 0.3em;
		padding: 0.2em;
		font-size: 1.2em;
		height: 35vh;
		width: 100%;
	}
	.key {
		display: flex;
		flex-direction: column;
		border: medium solid #444;
		border-radius: 3px;
		overflow: hidden;
		cursor: pointer;
		padding-top: 0.1em;
		font-size: 1.2em;
		color: #aaa;
	}
	.key::before {
		content: attr(data-key);
		text-align: center;
		height: 1.2em;
	}
	.key[data-key='tab'] {
		grid-column: 1 / -1;
	}
	.key[data-key='tab'].hidden {
		display: none;
	}
	.scale:has(.key[data-key='tab'].hidden) {
		grid-template-rows: repeat(3, 1fr);
	}
	.key[data-key='q'] {
		border-color: red;
	}
	.key[data-key='e'] {
		border-color: blue;
	}
	.key.held {
		border-color: white;
	}
	.content {
		flex: 1;
		display: flex;
		align-items: center;
		justify-content: center;
		font-size: 1.25em;
		font-weight: bold;
		padding: 0.1em;
		overflow: hidden;
		color: #fff;
	}
	.key[data-key='q'] .content,
	.key[data-key='e'] .content {
		font-size: 0.85em;
	}
	.content svg {
		max-width: 95%;
		max-height: 95%;
	}
</style>

<div class="keyboard"><div class="scale"></div></div>

<script>
	(function (u) {
		if (!u || u.kb) return;
		const svg = (inner, fill) =>
			`<svg viewBox="0 0 880 596" style="width:100%;height:100%"><rect width="860" height="576" x="10" y="10" fill="${fill || 'none'}" stroke="#00f" stroke-width="30" rx="16"/>${inner}</svg>`;
		const div = (...d) =>
			d.length
				? `<path stroke="#00f" stroke-width="30" d="${d.join('')}"/>`
				: '';
		const pane = (x, y, w, h) =>
			`<rect width="${w}" height="${h}" x="${x}" y="${y}" fill="#00f"/>`;
		const vari = (cls, ...d) => ({ class: cls, svg: svg(div(...d)) });
		const focus = (p, ...d) => svg(pane(...p) + div(...d));

		const [V, H] = ['M440 10v576', 'M10 298h860'];
		const [HR, HL, VB, VT] = [
			'M440 298h430',
			'M10 298h430',
			'M440 298v288',
			'M440 10v288',
		];
		const [LF, RF] = [
			[25, 25, 415, 546],
			[455, 25, 415, 546],
		];
		const [TF, BF] = [
			[25, 25, 830, 258],
			[25, 313, 830, 258],
		];
		const [TL, TR, BL, BR] = [
			[25, 25, 415, 258],
			[455, 25, 415, 258],
			[25, 313, 415, 258],
			[455, 313, 415, 258],
		];

		u.layouts = [
			{ visible: 1, variants: [vari('l00')], focus: [svg('', '#00f')] },
			{
				visible: 2,
				variants: [vari('l10', V), vari('l11', H)],
				focus: [
					...[LF, RF].map((p) => focus(p, V)),
					...[TF, BF].map((p) => focus(p, H)),
				],
			},
			{
				visible: 3,
				variants: [
					vari('l20', V, HR),
					vari('l21', H, VB),
					vari('l22', V, HL),
					vari('l23', H, VT),
				],
				focus: [
					...[LF, TR, BR].map((p) => focus(p, V, HR)),
					...[TF, BL, BR].map((p) => focus(p, H, VB)),
					...[RF, TL, BL].map((p) => focus(p, V, HL)),
					...[BF, TL, TR].map((p) => focus(p, H, VT)),
				],
			},
		];

		const KEYS = ['tab', 1, 2, 3, 'q', 'w', 'e', 'a', 's', 'd'];
		const scale = document.querySelector('.scale');
		const els = {};

		scale.innerHTML = KEYS.map(
			(k) =>
				`<div class="key${k === 'tab' ? ' hidden' : ''}" data-key="${k}"><div class="content"></div></div>`,
		).join('');

		scale.querySelectorAll('.key').forEach((key) => {
			const k = key.dataset.key;
			els[k] = { key, content: key.firstElementChild };
			key.onpointerdown = () => u.key(k, true);
			key.onpointerup = key.onpointerleave = () => u.key(k, false);
		});

		u.kb = {
			render() {
				const {
					layouts,
					layout: [li, vi],
					keys,
					focused,
				} = u;
				if (!layouts?.length) return;

				const current = layouts[li];
				els.tab.key.classList.toggle('hidden', !li);
				if (li)
					els.tab.content.innerHTML =
						current.focus?.[vi * current.visible + focused] ?? '';

				[1, 2, 3].forEach((n) => {
					const l = layouts[n - 1];
					const idx =
						n === 1 || li !== n - 1
							? 0
							: (vi + 1) % l.variants.length;
					els[n].content.innerHTML = l?.variants[idx].svg ?? '';
				});

				['q', 'w', 'e', 'a', 's', 'd'].forEach(
					(k) =>
						(els[k].content.textContent = keys.get(k)?.desc ?? ''),
				);
				KEYS.forEach((k) =>
					els[String(k)]?.key.classList.toggle(
						'held',
						!!keys.get(String(k))?.held,
					),
				);
			},
		};
		u.kb.render();
	})(pathless);
</script>
