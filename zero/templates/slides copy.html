<style>
	.slides {
		display: flex;
		align-items: center;
		justify-content: center;
		touch-action: none;
	}
	.slides canvas {
		max-width: 95%;
		max-height: 95%;
	}
</style>

<div class="slides">
	<canvas></canvas>
	<div class="slides-svg"></div>
</div>

<script>
	{
		const prefix = '{{.PREFIX}}';
		const url = '{{.URL}}';

		class Slides {
			constructor() {
				this.canvas = document.querySelector('.slides canvas');
				this.ctx = this.canvas.getContext('2d');
				this.bitmaps = [];
				this.index = pathless.read()[prefix] || 0;
				this.svg = document.querySelector('.slides-svg');

				pathless.input.register({
					key: 'a',
					gesture: 'tapLeft',
					down: () => this.show(this.index - 1),
					space: state.focused,
				});
				pathless.input.register({
					key: 'd',
					gesture: 'tapRight',
					down: () => this.show(this.index + 1),
					space: state.focused,
				});

				pathless.source(url).then(async (entries) => {
					this.slides = await Promise.all(
						entries.map(async (e) => {
							if (e.type === 'image/svg+xml') {
								return {
									kind: 'svg',
									data: new TextDecoder().decode(e.data),
								};
							}
							return {
								kind: 'bitmap',
								data: await createImageBitmap(
									new Blob([e.data.slice()], {
										type: e.type,
									}),
								),
							};
						}),
					);
					this.show(this.index);
				});
			}

			show(i) {
				if (!this.slides.length) return;
				this.index =
					((i % this.slides.length) + this.slides.length) %
					this.slides.length;
				pathless.write(prefix, this.index);
				const slide = this.slides[this.index];
				if (slide.kind === 'svg') {
					this.canvas.hidden = true;
					this.svg.hidden = false;
					this.svg.innerHTML = slide.data;
				} else {
					this.svg.hidden = true;
					this.canvas.hidden = false;

					const bmp = slide.data;
					const container = this.canvas.parentElement;
					const maxW = container.clientWidth * 0.95;
					const maxH = container.clientHeight * 0.95;
					const scale = Math.min(
						maxW / bmp.width,
						maxH / bmp.height,
						1,
					);
					this.canvas.width = Math.round(bmp.width * scale);
					this.canvas.height = Math.round(bmp.height * scale);
					this.ctx.drawImage(
						bmp,
						0,
						0,
						this.canvas.width,
						this.canvas.height,
					);
				}
			}
		}

		new Slides();
	}
</script>
