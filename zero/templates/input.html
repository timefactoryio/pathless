<script>
	class Input {
		constructor() {
			this.u = window.pathless;
			const el = this.u.universe;
			const emit = (key, phase) =>
				el.dispatchEvent(
					new CustomEvent('input', {
						detail: { key, phase },
					}),
				);

			// physical keyboard
			window.addEventListener('keydown', (e) => {
				if (!e.repeat) emit(e.key, 'down');
			});
			window.addEventListener('keyup', (e) => emit(e.key, 'up'));

			// virtual keyboard — pointer on [data-key] elements
			el.addEventListener('pointerdown', (e) => {
				const key = e.target.closest('[data-key]')?.dataset.key;
				if (!key) return;
				el.setPointerCapture(e.pointerId);
				emit(key, 'down');
			});
			el.addEventListener('pointerup', (e) => {
				const key = e.target.closest('[data-key]')?.dataset.key;
				if (key) emit(key, 'up');
			});
			el.addEventListener('pointercancel', (e) => {
				const key = e.target.closest('[data-key]')?.dataset.key;
				if (key) emit(key, 'up'); // treat cancel same as up
			});
		}
	}
</script>
