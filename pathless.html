<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>hello.universe</title>
		<style>
			:root {
				--b: 1px solid blue;
			}
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
				user-select: none;
				-webkit-user-select: none;
				scrollbar-width: none;
			}
			html,
			body {
				height: 100vh;
				overflow: hidden;
				font-family: sans-serif;
				background: #000;
				color: #fff;
			}
			body {
				display: flex;
				border: var(--b);
				border-radius: 5px;
			}
			a {
				color: inherit;
				text-decoration: none;
			}
			#universe {
				width: 100vw;
				height: 100vh;
				display: grid;
			}
			.space {
				display: flex;
				align-items: center;
				justify-content: center;
				overflow: hidden;
			}
			.l00 {
				display: flex;
			}
			.l10 {
				grid-template: 1fr / 1fr 1fr;
			}
			.l10 #zero {
				border-right: var(--b);
			}
			.l11 {
				grid-template: 1fr 1fr / 1fr;
			}
			.l11 #zero {
				border-bottom: var(--b);
			}
			.l20,
			.l21,
			.l22,
			.l23 {
				grid-template: 1fr 1fr / 1fr 1fr;
			}
			.l20 #zero,
			.l22 #zero {
				grid-row: 1/3;
			}
			.l20 #zero {
				border-right: var(--b);
			}
			.l20 #one,
			.l22 #one {
				border-bottom: var(--b);
			}
			.l21 #zero,
			.l23 #zero {
				grid-column: 1/3;
			}
			.l21 #zero {
				border-bottom: var(--b);
			}
			.l21 #one,
			.l23 #one {
				border-right: var(--b);
			}
			.l22 #zero {
				grid-column: 2;
				border-left: var(--b);
			}
			.l23 #zero {
				grid-row: 2;
				border-top: var(--b);
			}
			#three {
				width: 25vw;
				height: 100vh;
				border-right: var(--b);
				display: none;
				order: -1;
			}
		</style>
		<script>
			class Universe {
				constructor() {
					window.apiUrl = '{{.APIURL}}';
					this.universe = document.getElementById('universe');
					this.space = ['zero', 'one', 'two', 'three'].map((id) => ({
						el: document.getElementById(id),
						index: 0,
						frame: null,
						state: new Map(),
						visible: false,
					}));
					this.frames = [];
					this.layouts = [];
					this.layout = [0, 0];
					this.prevLayout = [0, 0];
					this.focused = 0;
					this.cache = new Map();
					this.keys = new Map();

					window.addEventListener('keydown', (e) =>
						this.key(e, true),
					);
					window.addEventListener('keyup', (e) => this.key(e, false));
					this.init();
				}

				async init() {
					const { frames, layouts, keyboard } = await this.fetch(
						window.apiUrl,
					);
					this.frames = frames;
					this.layouts = layouts;
					this.space.forEach((s) => {
						s.state = new Map(frames.map((_, i) => [i, new Map()]));
					});
					this.space[3].el.innerHTML = keyboard;
					this.exec(this.space[3].el);
					this.sync();
				}

				get current() {
					return this.space[this.focused];
				}

				write(key, value) {
					this.current.state.get(this.current.index).set(key, value);
				}

				read() {
					return Object.fromEntries(
						this.current.state.get(this.current.index),
					);
				}

				key(e, down) {
					const k = typeof e === 'string' ? e : e.key.toLowerCase();
					const bind = this.keys.get(k);
					if (!bind) return;
					if (k === 'tab') e.preventDefault?.();
					if (down) {
						if (bind.held && bind.up) return;
						bind.held = true;
						bind.down();
					} else {
						bind.held = false;
						bind.up?.();
					}
					this.kb?.update(k);
				}

				onKey(key, down, { up, global, desc } = {}) {
					this.keys.set(key.toLowerCase(), {
						down,
						up,
						global,
						desc,
						held: false,
					});
					return this;
				}

				offKey(key) {
					const k = key.toLowerCase();
					const bind = this.keys.get(k);
					if (bind?.held) {
						bind.held = false;
						bind.up?.();
					}
					this.keys.delete(k);
					this.kb?.update(k);
					return this;
				}

				cleanup() {
					for (const [k, bind] of [...this.keys]) {
						if (bind.global) continue;
						if (bind.held) {
							bind.held = false;
							bind.up?.();
						}
						this.keys.delete(k);
					}
					this.kb?.render();
				}

				toggleKeyboard() {
					const panel = this.space[3];
					panel.visible = !panel.visible;
					this.universe.style.width = panel.visible
						? '75vw'
						: '100vw';
					panel.el.style.display = panel.visible ? 'flex' : 'none';
					this.sync();
				}

				setLayout(n) {
					this.cleanup();
					if (!n) {
						this.layout = this.layout[0]
							? ((this.prevLayout = this.layout), [0, 0])
							: this.prevLayout;
					} else {
						this.focused = Math.min(this.focused, n);
						this.layout = [
							n,
							this.layout[0] === n
								? (this.layout[1] + 1) %
									this.layouts[n].variants.length
								: 0,
						];
					}
					this.sync();
				}

				cycleFocus() {
					this.cleanup();
					this.focused = (this.focused + 1) % (this.layout[0] + 1);
					this.sync();
				}

				nav(dir) {
					this.cleanup();
					this.current.index =
						(this.current.index + dir + this.frames.length) %
						this.frames.length;
					this.sync();
				}

				exec(el) {
					for (const old of el.querySelectorAll('script, style')) {
						const fresh = document.createElement(old.localName);
						for (const { name, value } of old.attributes)
							fresh.setAttribute(name, value);
						fresh.textContent = old.textContent;
						old.replaceWith(fresh);
					}
				}

				sync() {
					const { layouts, layout, focused, frames, space } = this;
					const current = layouts[layout[0]];
					const variant = current.variants[layout[1]];
					this.universe.className = variant.class;

					space.slice(0, 3).forEach((s, i) => {
						const shouldBeVisible =
							layout[0] === 0
								? i === focused
								: i < current.visible;
						s.el.style.display = shouldBeVisible ? '' : 'none';
						if (shouldBeVisible) {
							const frame = frames[s.index];
							if (frame !== s.frame) {
								s.el.innerHTML = frame;
								s.frame = frame;
							}
							if (i === focused) this.exec(s.el);
						}
					});
					if (space[3].visible) {
						this.exec(space[3].el);
						this.kb.render();
					}
				}

				async fetch(url) {
					if (!this.cache.has(url))
						this.cache.set(
							url,
							fetch(url).then((r) => {
								if (!r.ok) throw new Error(`HTTP ${r.status}`);
								return r.headers
									.get('content-type')
									?.includes('json')
									? r.json()
									: r.text();
							}),
						);
					return this.cache.get(url);
				}
			}

			document.addEventListener('DOMContentLoaded', () => {
				const u = (window.pathless = new Universe());
				u.onKey('tab', () => u.cycleFocus(), { global: true })
					.onKey('1', () => u.setLayout(0), { global: true })
					.onKey('2', () => u.setLayout(1), { global: true })
					.onKey('3', () => u.setLayout(2), { global: true })
					.onKey('q', () => u.nav(-1), { global: true, desc: 'back' })
					.onKey('e', () => u.nav(1), { global: true, desc: 'next' })
					.onKey('z', () => u.toggleKeyboard(), { global: true });
				window.space = (i) => u.current.el;
				window.frame = () => u.current.el.firstElementChild;
				window.onKey = (key, down, opts) => u.onKey(key, down, opts);
				window.offKey = (key) => u.offKey(key);
			});
		</script>
	</head>
	<body>
		<div id="universe">
			<div class="space" id="zero"></div>
			<div class="space" id="one"></div>
			<div class="space" id="two"></div>
		</div>
		<div class="space" id="three"></div>
	</body>
</html>
