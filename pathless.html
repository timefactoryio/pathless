<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>hello.universe</title>
		<style>
			:root {
				--b: 1px solid blue;
			}
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
				user-select: none;
				-webkit-user-select: none;
				scrollbar-width: none;
			}
			body {
				height: 100dvh;
				overflow: hidden;
				font-family: sans-serif;
				background: #000;
				color: #fff;
				display: flex;
				border: var(--b);
				border-radius: 5px;
				text-decoration: none;
			}
			#universe {
				flex: 1;
				display: flex;
			}
			:is(#zero, #fx, #one) {
				flex: 1;
				overflow: hidden;
				container-type: size;
				position: relative;
				isolation: isolate;
				display: flex;
				flex-direction: column;
			}
			:is(#zero, #fx, #one) > * {
				width: 100%;
			}
			:is(#zero, #fx, #one) > :first-child {
				flex: 1;
				min-height: 0;
			}
			#zero {
				grid-area: zero;
				container-name: zero;
			}
			#fx {
				grid-area: fx;
				container-name: fx;
			}
			#one {
				grid-area: one;
				container-name: one;
			}
		</style>
		<script>
			class Universe {
				constructor() {
					this.universe = document.getElementById('universe');
					this.space = ['zero', 'fx', 'one'].map((id) =>
						document.getElementById(id),
					);
					fetch('{{.APIURL}}')
						.then((r) => r.arrayBuffer())
						.then((buf) => this.decode(buf));
				}

				decode(buf) {
					const td = new TextDecoder();
					const parse = (arr) => JSON.parse(td.decode(arr));
					const len = new DataView(buf).getUint32(0);
					const [kb, ...frames] = parse(new Uint8Array(buf, 4, len));
					this.universe.kb = kb;
					this.universe.frames = frames;
				}
				render(i = +this.universe.dataset.focused) {
					const el = this.space[i];
					el.innerHTML = this.frames[el.dataset.frame | 0];
				}
			}

			document.addEventListener('DOMContentLoaded', () => {
				window.pathless = new Universe();
			});
		</script>
	</head>
	<body>
		<div id="universe" data-focused="0" data-layout="1" data-variant="0">
			<div id="zero" data-frame="0"></div>
			<div id="fx" data-frame="0"></div>
			<div id="one" data-frame="0"></div>
		</div>
	</body>
</html>
