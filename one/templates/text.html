<style>
	.text {
		overflow: hidden auto;
		height: 100%;
		font-size: clamp(0.875rem, 2.3cqw, 1.1rem);
		padding: clamp(0.75rem, 2cqw, 1.5rem);
		max-width: 90cqw;
		margin-inline: auto;

		border-radius: 0.4em;
	}
	.text hr {
		border: none;

	.text h1 {
		font-size: clamp(1.5rem, 5cqw, 2.5rem);

	.text h2 {

		border-collapse: separate;

		border: 1px solid #333;
		padding: clamp(0.4em, 1.5cqw, 0.7em) clamp(0.6em, 2cqw, 1.2em);
		vertical-align: middle;
	}
	.text th {
		font-weight: 700;
		text-align: center;
		background: #232323;

		text-align: left;

		background: #232323;

</style>
<script>
	{
		class Text {
			#raf = null;

			#scroll(dy) {
				if (this.#raf) return;
				const speed = 100;
				let last = null;
				const tick = (ts) => {
					if (last !== null)
						this.el.scrollBy(0, (dy * speed * (ts - last)) / 1000);
					last = ts;
					this.#raf = requestAnimationFrame(tick);
				};
				this.#raf = requestAnimationFrame(tick);
			}
			#stop() {
				cancelAnimationFrame(this.#raf);
				this.#raf = null;
			}

			constructor(p) {
				const { read, write } = p.universe.pin();
				this.el = p.universe.space.el.querySelector('.text');
				const saved = read().get('scroll');
				if (saved) {
					const restore = () => {
						this.el.scrollTop = saved;
						if (Math.abs(this.el.scrollTop - saved) > 1)
							requestAnimationFrame(restore);
					};
					requestAnimationFrame(restore);
				}
				this.el.addEventListener(
					'scroll',
					() => write('scroll', this.el.scrollTop),
					{ passive: true },
				);
				p.input.bind({
					w: {
						down: () => this.#scroll(-20),
						up: () => this.#stop(),
					},
					s: { down: () => this.#scroll(20), up: () => this.#stop() },
				});
			}
		}
		new Text(pathless);
	}
</script>
