<style>
	.slides {
		display: flex;
		align-items: center;
		justify-content: center;
		width: 100%;
		height: 100%;
		overflow: hidden;
		touch-action: none;
	}
	.slides img {
		max-width: 95cqw;
		max-height: 95cqh;
		object-fit: contain;
	}
</style>

<div class="slides"><img /></div>

<script>
	{
		const prefix = '{{.PREFIX}}';
		class Slides {
			constructor(p) {
				const { read, write } = p.universe.pin();
				this.write = write;
				this.img = p.universe.space.el.querySelector('.slides img');
				this.entries = [];
				this.index = read().get(prefix) || 0;
				const nav = (d) => () => this.show(this.index + d);
				p.input.bind({
					tapLeft: nav(-1),
					tapRight: nav(1),
					a: { down: nav(-1) },
					d: { down: nav(1) },
				});
				p.source(prefix).then((entries) => {
					this.entries = entries;
					if (this.entries.length) this.show(this.index);
				});
			}
			show(n) {
				if (!this.entries.length) return;
				this.index =
					((n % this.entries.length) + this.entries.length) %
					this.entries.length;
				this.write(prefix, this.index);
				const { url } = this.entries[this.index];
				Object.assign(this.img, { src: url });
			}
		}
		new Slides(pathless);
	}
</script>
