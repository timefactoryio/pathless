<style>
	.slides {
		display: flex;
		align-items: center;
		justify-content: center;
		width: 100%;
		height: 100%;
		overflow: hidden;
		touch-action: none;
	}
	.slides img {
		max-width: 95cqw;
		max-height: 95cqh;
		object-fit: contain;
	}
</style>

<div class="slides"><img /></div>

<script>
	{
		const prefix = '{{.PREFIX}}';
		class Slides {
			constructor(p) {
				this.p = p;
				this.i = p.universe.state.focused;
				this.element = p.universe.space.el.querySelector('.slides');
				this.img = this.element.querySelector('img');
				this.entries = [];
				this.index = p.universe.read(this.i).get(prefix) || 0;
				p.input.tap((g) =>
					this.show(this.index + (g.end[0] < 0 ? -1 : 1)),
				);
				p.keyboard.keyNav({
					a: { down: () => this.show(this.index - 1) },
					d: { down: () => this.show(this.index + 1) },
				});
				p.source(prefix).then((entries) => {
					this.entries = entries;
					if (this.entries.length) this.show(this.index);
				});
			}
			show(n) {
				if (!this.entries.length) return;
				this.index =
					((n % this.entries.length) + this.entries.length) %
					this.entries.length;
				this.p.universe.write(prefix, this.index, this.i);
				const { url } = this.entries[this.index];
				Object.assign(this.img, { src: url });
			}
		}
		new Slides(pathless);
	}
</script>
