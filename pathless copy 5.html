<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>hello.universe</title>
		<style>
			:root {
				--b: 1px solid blue;
			}
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
				user-select: none;
				-webkit-user-select: none;
				scrollbar-width: none;
			}
			body {
				height: 100dvh;
				overflow: hidden;
				font-family: sans-serif;
				background: #000;
				color: #fff;
				display: flex;
				border: var(--b);
				border-radius: 5px;
				text-decoration: none;
			}
			#universe {
				flex: 1;
				display: flex;
			}
			.space {
				flex: 1;
				overflow: hidden;
				container-type: size;
				container-name: var(--name);
				position: relative;
				isolation: isolate;
				display: flex;
				flex-direction: column;
			}
			.space > * {
				width: 100%;
			}
			.space > :first-child {
				flex: 1;
				min-height: 0;
			}
			#zero {
				grid-area: zero;
				--name: zero;
			}
			#one {
				grid-area: one;
				--name: one;
			}
			#two {
				grid-area: two;
				--name: two;
			}
			#panel {
				height: 40%;
				flex-shrink: 0;
				border-top: var(--b);
			}
			#universe[data-layout='v'] {
				flex-direction: column;
			}
			#universe[data-layout='h'] #zero {
				border-right: var(--b);
			}
			#universe[data-layout='v'] #zero {
				border-bottom: var(--b);
			}
			#universe[data-variant='0'] {
				display: grid;
				grid-template: 'zero one' 1fr 'zero two' 1fr / 1fr 1fr;
			}
			#universe[data-variant='1'] {
				display: grid;
				grid-template: 'zero zero' 1fr 'one  two' 1fr / 1fr 1fr;
			}
			#universe[data-variant='2'] {
				display: grid;
				grid-template: 'one  zero' 1fr 'two  zero' 1fr / 1fr 1fr;
			}
			#universe[data-variant='3'] {
				display: grid;
				grid-template: 'one  two' 1fr 'zero zero' 1fr / 1fr 1fr;
			}
			#universe[data-variant='0'] #zero {
				border-right: var(--b);
			}
			#universe[data-variant='1'] #zero {
				border-bottom: var(--b);
			}
			#universe[data-variant='2'] #zero {
				border-left: var(--b);
			}
			#universe[data-variant='3'] #zero {
				border-top: var(--b);
			}
			#universe[data-variant='1'] #one,
			#universe[data-variant='3'] #one {
				border-right: var(--b);
			}
		</style>
		<script>
			class Universe {
				constructor() {
					this.universe = { el: document.getElementById('universe') };
					this.space = ['zero', 'one', 'two'].map((id) => ({
						el: document.getElementById(id),
						state: { frame: 0 },
					}));
					this.panel = Object.assign(document.createElement('div'), {
						id: 'panel',
					});
					fetch('{{.APIURL}}')
						.then((r) => r.arrayBuffer())
						.then((buf) => this.decode(buf));
				}

				decode(buf) {
					const td = new TextDecoder();
					const parse = (arr) => JSON.parse(td.decode(arr));
					const len = new DataView(buf).getUint32(0);
					const [kb, ...frames] = parse(new Uint8Array(buf, 4, len));
					this.universe.kb = kb;
					this.universe.frames = frames;
				}

				state(target, value) {
					if (target in this.universe.el.dataset) {
						if (value !== undefined)
							this.universe.el.dataset[target] = value;
						return this.universe.el.dataset[target];
					}
					const s = this.space[this.universe.el.dataset.focused];
					if (value !== undefined) s.state[target] = value;
					return s.state[target];
				}

				toggle() {
					const el = this.space[this.universe.el.dataset.focused].el;
					el.contains(this.panel)
						? this.panel.remove()
						: el.appendChild(this.panel);
				}
			}

			document.addEventListener('DOMContentLoaded', () => {
				window.pathless = new Universe();
			});
		</script>
	</head>
	<body>
		<div id="universe" data-focused="0" data-layout="0" data-variant="0">
			<div class="space" data-space="0" data-frame="0"></div>
			<div class="space" data-space="1" data-frame="0"></div>
			<div class="space" data-space="2" data-frame="0"></div>
		</div>
	</body>
</html>
