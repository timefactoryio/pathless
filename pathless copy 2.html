<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>hello.universe</title>
		<style>
			:root {
				--b: 1px solid blue;
			}
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
				user-select: none;
				-webkit-user-select: none;
				scrollbar-width: none;
			}
			body {
				height: 100dvh;
				overflow: hidden;
				font-family: sans-serif;
				background: #000;
				color: #fff;
				display: flex;
				border: var(--b);
				border-radius: 5px;
			}
			a {
				color: inherit;
				text-decoration: none;
			}
			#universe {
				width: 100vw;
				height: 100vh;
				display: grid;
			}
			.space {
				display: flex;
				align-items: center;
				justify-content: center;
				overflow: hidden;
				container-type: size;
			}
			.l00 {
				display: flex;
			}
			.l10 {
				grid-template: 1fr / 1fr 1fr;
			}
			.l10 #zero {
				border-right: var(--b);
			}
			.l11 {
				grid-template: 1fr 1fr / 1fr;
			}
			.l11 #zero {
				border-bottom: var(--b);
			}
			.l20,
			.l21,
			.l22,
			.l23 {
				grid-template: 1fr 1fr / 1fr 1fr;
			}
			.l20 #zero,
			.l22 #zero {
				grid-row: 1/3;
			}
			.l20 #zero {
				border-right: var(--b);
			}
			.l20 #one,
			.l22 #one {
				border-bottom: var(--b);
			}
			.l21 #zero,
			.l23 #zero {
				grid-column: 1/3;
			}
			.l21 #zero {
				border-bottom: var(--b);
			}
			.l21 #one,
			.l23 #one {
				border-right: var(--b);
			}
			.l22 #zero {
				grid-column: 2;
				border-left: var(--b);
			}
			.l23 #zero {
				grid-row: 2;
				border-top: var(--b);
			}
		</style>
		<script>
			class Universe {
				constructor() {
					window.apiUrl = '{{.APIURL}}';
					this.universe = document.getElementById('universe');
					this.space = ['zero', 'one', 'two'].map((id) => ({
						el: document.getElementById(id),
						index: 0,
						frame: null,
						state: new Map(),
					}));
					this.frames = [];
					this.layouts = [];
					this.layout = [0, 0];
					this.prevLayout = [0, 0];
					this.focused = 0;
					this.cache = new Map();
					this.init();
				}

				async init() {
					const entries = await this.fetch(window.apiUrl);
					const decoder = new TextDecoder();

					this.frames = entries
						.slice(1)
						.map((e) => decoder.decode(e.data));

					this.space.forEach((s) => {
						s.state = new Map(
							this.frames.map((_, i) => [i, new Map()]),
						);
					});
					this.sync();
				}

				get current() {
					return this.space[this.focused];
				}

				write(key, value) {
					this.current.state.get(this.current.index).set(key, value);
				}

				read() {
					return Object.fromEntries(
						this.current.state.get(this.current.index),
					);
				}

				setLayout(n) {
					if (!n) {
						if (this.layout[0]) {
							this.prevLayout = this.layout;
							this.layout = [0, 0];
						} else {
							this.layout = this.prevLayout;
						}
					} else {
						this.focused = Math.min(this.focused, n);
						const v =
							this.layout[0] === n
								? (this.layout[1] + 1) %
									this.layouts[n].variants.length
								: 0;
						this.layout = [n, v];
					}
					this.sync();
				}

				cycleFocus() {
					this.focused = (this.focused + 1) % (this.layout[0] + 1);
					this.sync();
				}

				nav(dir) {
					this.current.index =
						(this.current.index + dir + this.frames.length) %
						this.frames.length;
					this.sync();
				}

				exec(el) {
					for (const old of el.querySelectorAll('script, style')) {
						const fresh = document.createElement(old.localName);
						for (const { name, value } of old.attributes)
							fresh.setAttribute(name, value);
						fresh.textContent = old.textContent;
						old.replaceWith(fresh);
					}
				}

				sync() {
					const { layouts, layout, focused, frames, space } = this;
					const current = layouts[layout[0]];
					const variant = current.variants[layout[1]];
					this.universe.className = variant.class;

					space.forEach((s, i) => {
						const shouldBeVisible =
							layout[0] === 0
								? i === focused
								: i < current.visible;
						s.el.style.display = shouldBeVisible ? '' : 'none';
						if (shouldBeVisible) {
							const frame = frames[s.index];
							if (frame !== s.frame) {
								s.el.innerHTML = frame;
								s.frame = frame;
							}
							if (i === focused) this.exec(s.el);
						}
					});
				}

				async load(url) {
					if (this.cache.has(url)) return this.cache.get(url);
					const r = await fetch(url);
					if (!r.ok) throw new Error(`HTTP ${r.status}`);
					const ct = r.headers.get('content-type') || '';
					let data;
					if (ct.includes('json')) {
						data = await r.json();
					} else if (ct.includes('octet-stream')) {
						const buf = await r.arrayBuffer();
						const len = new DataView(buf).getUint32(0);
						data = JSON.parse(
							new TextDecoder().decode(
								new Uint8Array(buf, 4, len),
							),
						);
						let offset = 4 + len;
						for (const e of data) {
							e.data = new Uint8Array(buf, offset, e.size);
							offset += e.size;
						}
					} else {
						data = await r.text();
					}
					this.cache.set(url, data);
					return data;
				}
			}

			document.addEventListener('DOMContentLoaded', () => {
				const u = (window.pathless = new Universe());
				window.space = () => u.current.el;
				window.frame = () => u.current.el.firstElementChild;
			});
		</script>
	</head>
	<body>
		<div id="universe">
			<div class="space" id="zero"></div>
			<div class="space" id="one"></div>
			<div class="space" id="two"></div>
		</div>
	</body>
</html>
