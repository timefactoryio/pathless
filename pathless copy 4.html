<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>hello.universe</title>
		<style>
			:root {
				--b: 1px solid blue;
			}
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
				user-select: none;
				-webkit-user-select: none;
				scrollbar-width: none;
			}
			body {
				height: 100dvh;
				overflow: hidden;
				font-family: sans-serif;
				background: #000;
				color: #fff;
				display: flex;
				border: var(--b);
				border-radius: 5px;
				text-decoration: none;
			}
			#universe {
				flex: 1;
				display: flex;
			}
			.space {
				flex: 1;
				overflow: hidden;
				container-type: size;
				container-name: var(--name);
				position: relative;
				isolation: isolate;
				display: flex;
				flex-direction: column;
			}
			.space > * {
				width: 100%;
			}
			.space > :first-child {
				flex: 1;
				min-height: 0;
			}
			#zero {
				grid-area: zero;
				--name: zero;
			}
			#one {
				grid-area: one;
				--name: one;
			}
			#two {
				grid-area: two;
				--name: two;
			}
			#panel {
				height: 40%;
				flex-shrink: 0;
				border-top: var(--b);
			}
			#universe[data-variant='v'] {
				flex-direction: column;
			}
			#universe[data-variant='h'] #zero {
				border-right: var(--b);
			}
			#universe[data-variant='v'] #zero {
				border-bottom: var(--b);
			}
			#universe[data-variant='0'] {
				display: grid;
				grid-template: 'zero one' 1fr 'zero two' 1fr / 1fr 1fr;
			}
			#universe[data-variant='1'] {
				display: grid;
				grid-template: 'zero zero' 1fr 'one  two' 1fr / 1fr 1fr;
			}
			#universe[data-variant='2'] {
				display: grid;
				grid-template: 'one  zero' 1fr 'two  zero' 1fr / 1fr 1fr;
			}
			#universe[data-variant='3'] {
				display: grid;
				grid-template: 'one  two' 1fr 'zero zero' 1fr / 1fr 1fr;
			}
			#universe[data-variant='0'] #zero {
				border-right: var(--b);
			}
			#universe[data-variant='1'] #zero {
				border-bottom: var(--b);
			}
			#universe[data-variant='2'] #zero {
				border-left: var(--b);
			}
			#universe[data-variant='3'] #zero {
				border-top: var(--b);
			}
			#universe[data-variant='1'] #one,
			#universe[data-variant='3'] #one {
				border-right: var(--b);
			}
		</style>
		<script>
			class Universe {
				constructor() {
					this.universe = {
						el: document.getElementById('universe'),
						state: new Map(),
					};
					this.space = ['zero', 'one', 'two'].map((id) => ({
						el: document.getElementById(id),
						state: new Map(),
					}));
					this.panel = Object.assign(document.createElement('div'), {
						id: 'panel',
					});
					this.call('{{.APIURL}}').then((entries) => {
						const decode = (e) =>
							new Map(
								Object.entries(
									JSON.parse(
										new TextDecoder().decode(e.data),
									),
								),
							);
						this.universe.state = decode(entries[0]);
						const spaceState = decode(entries[1]);
						this.space.forEach(
							(s) => (s.state = new Map(spaceState)),
						);
						this.universe.kb = entries[2];
						this.universe.frames = entries.slice(3);
					});
				}

				async call(url) {
					const buf = await fetch(url).then((r) => r.arrayBuffer());
					const len = new DataView(buf).getUint32(0);
					const manifest = JSON.parse(
						new TextDecoder().decode(new Uint8Array(buf, 4, len)),
					);
					let offset = 4 + len;
					for (const e of manifest) {
						e.data = new Uint8Array(buf, offset, e.size);
						offset += e.size;
					}
					return manifest;
				}

				state(target, value) {
					const map = this.universe.state.has(target)
						? this.universe.state
						: this.space[this.universe.state.get('focused')].state;
					if (value !== undefined) map.set(target, value);
					return map.get(target);
				}

				toggle() {
					const el = this.space[this.state('focused')].el;
					el.contains(this.panel)
						? this.panel.remove()
						: el.appendChild(this.panel);
				}
			}

			document.addEventListener('DOMContentLoaded', () => {
				window.pathless = new Universe();
			});
		</script>
	</head>
	<body>
		<div id="universe">
			<div class="space" id="zero"></div>
			<div class="space" id="one"></div>
			<div class="space" id="two"></div>
		</div>
	</body>
</html>
