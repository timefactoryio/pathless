<style>
	.keyboard {
		display: grid;
		grid-template-columns: repeat(3, 1fr);
		grid-template-rows: repeat(2, 1fr);
		gap: 0.3em;
		padding: 0.2em;
		font-size: 1.2em;
		width: 100%;
	}
	.key {
		display: flex;
		flex-direction: column;
		border: medium solid #444;
		border-radius: 3px;
		overflow: hidden;
		cursor: pointer;
		font-size: 1.2em;
		color: #aaa;
	}
	.key[data-key='q'] {
		border-color: red;
	}
	.key[data-key='e'] {
		border-color: blue;
	}
	.key.held {
		border-color: white;
	}
	.key .top {
		flex: 1;
		display: flex;
		align-items: center;
		justify-content: center;
	}
	.key .bottom {
		flex: 4;
		display: flex;
		align-items: center;
		justify-content: center;
		font-size: 1.25em;
		font-weight: bold;
		padding: 0.1em;
		overflow: hidden;
		color: #fff;
	}
	.key[data-key='q'] .bottom,
	.key[data-key='e'] .bottom {
		font-size: 0.85em;
	}
</style>

<div class="keyboard"></div>

<script>
	class Keyboard {
		static KEYS = ['1', '2', '3', 'tab', 'q', 'e'];

		constructor(u) {
			this.u = u;
			this.els = {};
			this.el = document.querySelector('.keyboard');
			this.#build();
		}

		#build() {
			this.el.innerHTML = Keyboard.KEYS.map(
				(k) =>
					`<div class="key" data-key="${k}"><div class="top">${k}</div><div class="bottom"></div></div>`,
			).join('');

			this.el.querySelectorAll('.key').forEach((key) => {
				const k = key.dataset.key;
				this.els[k] = { key, bottom: key.lastElementChild };
				key.onpointerdown = () => this.u.key(k, true);
				key.onpointerup = key.onpointerleave = () =>
					this.u.key(k, false);
			});
		}

		render() {
			const { keys } = this.u;
			Keyboard.KEYS.forEach((k) => {
				this.els[k].bottom.textContent = keys.get(k)?.desc ?? '';
				this.els[k].key.classList.toggle('held', !!keys.get(k)?.held);
			});
		}
	}

	(function (u) {
		if (!u || u.kb) return;
		u.kb = new Keyboard(u);
		u.kb.render();
	})(pathless);
</script>
