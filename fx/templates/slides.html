<style>
	.slides {
		display: flex;
		align-items: center;
		justify-content: center;
		width: 100%;
		height: 100%;
		overflow: hidden;
		touch-action: none;
	}
	.slides img {
		max-width: 95%;
		max-height: 95%;
		object-fit: contain;
	}
</style>

<img src="" alt="" />

<script>
	{
		const spaceEl = document.currentScript.closest('#zero, #fx, #one');
		const i = pathless.universe.space.findIndex((s) => s.el === spaceEl);
		const prefix = '{{.PREFIX}}';
		const url = '{{.URL}}';

		class Slides {
			constructor() {
				this.img = document.querySelector('.slides img');
				this.entries = [];
				this.index = pathless.read(i).get(prefix) || 0;

				pathless.input.tapNav(i, {
					prev: () => this.show(this.index - 1),
					next: () => this.show(this.index + 1),
				});

				pathless.source(url).then((entries) => {
					for (const e of entries)
						if (!e.url)
							e.url = URL.createObjectURL(
								new Blob([e.data], { type: e.type }),
							);
					this.entries = entries;
					if (this.entries.length) this.show(this.index);
				});
			}

			show(n) {
				if (!this.entries.length) return;
				this.index =
					((n % this.entries.length) + this.entries.length) %
					this.entries.length;
				pathless.write(prefix, this.index, i);
				this.img.src = this.entries[this.index].url;
				this.img.alt = this.entries[this.index].name;
			}
		}

		new Slides();
	}
</script>
