<style>
	.slides {
		display: flex;
		align-items: center;
		justify-content: center;
		width: 100%;
		height: 100%;
		overflow: hidden;
	}
	.slides img {
		max-width: 95%;
		max-height: 95%;
		object-fit: contain;
	}
</style>

<div class="slides">
	<img src="" alt="" />
</div>

<script>
	{
		const prefix = '{{.PREFIX}}';
		const url = '{{.URL}}';

		class Slides {
			constructor() {
				this.img = document.querySelector('.slides img');
				this.entries = [];
				this.index = pathless.read()[prefix] || 0;

				pathless.input.register({
					key: 'a',
					gesture: 'tapLeft',
					down: () => this.show(this.index - 1),
					space: state.focused,
				});
				pathless.input.register({
					key: 'd',
					gesture: 'tapRight',
					down: () => this.show(this.index + 1),
					space: state.focused,
				});

				pathless.source(url).then((entries) => {
					for (const e of entries)
						if (!e.url)
							e.url = URL.createObjectURL(
								new Blob([e.data], { type: e.type }),
							);
					this.entries = entries;
					if (this.entries.length) this.show(this.index);
				});
			}

			show(i) {
				if (!this.entries.length) return;
				this.index =
					((i % this.entries.length) + this.entries.length) %
					this.entries.length;
				pathless.write(prefix, this.index);
				this.img.src = this.entries[this.index].url;
				this.img.alt = this.entries[this.index].name;
			}
		}

		new Slides();
	}
</script>
